  {num:2,text:"Определение входных параметров. Оценивается полнота и корректность выделения параметров.",ball:10},
  {num:3,text:"Формализация модели. Оценивается способность представить задачу в виде модели (математической, логической, структурной).",ball:10},
  {num:4,text:"Обоснование выбранного метода. Оценивается, насколько обоснован выбор метода решения.",ball:10},
  {num:5,text:"Корректность вычислений / решений. Оценивается правильность расчетов или логических выводов.",ball:10},
  {num:6,text:"Интерпретация результатов. Оценивается способность объяснить полученный результат.",ball:10},
  {num:7,text:"Анализ влияния параметров. Оценивается анализ чувствительности модели.",ball:10},
  {num:8,text:"Оценка устойчивости решения. Оценивается анализ изменения результата при изменении входных данных.",ball:10},
  {num:9,text:"Логика и структурированность решения. Оценивается последовательность и понятность изложения.",ball:10},
  {num:10,text:"Оформление и наглядность. Оценивается качество представления результата (таблицы, схемы, графики).",ball:10}
];

// Build ticket grid
const grid = document.getElementById('ticketGrid');
tickets.forEach(t => {
  const btn = document.createElement('div');
  btn.className = 'ticket-btn';
  btn.innerHTML = `<div class="num">${t.num}</div><div class="short"><strong>${t.short}</strong></div>`;
  btn.onclick = () => showTicket(t.num);
  grid.appendChild(btn);
});

// Build criteria table
const tbl = document.getElementById('criteriaTable');
let html = '<thead><tr><th>№</th><th>Критерий</th><th>Балл</th></tr></thead><tbody>';
criteria.forEach(c => {
  html += `<tr><td>${c.num}</td><td>${c.text}</td><td>${c.ball}</td></tr>`;
});
html += '<tr><td></td><td><strong>Итого:</strong></td><td><strong>100</strong></td></tr>';
html += '</tbody>';
tbl.innerHTML = html;

let currentTicket = null;

function showTicket(num, tab) {
  currentTicket = num;
  const t = tickets.find(x => x.num === num);
  if (!t) return;
  const prev = tickets.find(x => x.num === num - 1);
  const next = tickets.find(x => x.num === num + 1);
  const activeTab = tab || 'task';
  const answer = answers[num] || '';
  
  const card = document.getElementById('overlayCard');
  card.innerHTML = `
    <button class="close-btn" onclick="hideTicket()">×</button>
    <h2>Билет №${t.num} — ${t.short}</h2>
    <div class="tabs">
      <button class="tab ${activeTab === 'task' ? 'active' : ''}" onclick="showTicket(${num}, 'task')">📋 Задание</button>
      <button class="tab ${activeTab === 'answer' ? 'active' : ''}" onclick="showTicket(${num}, 'answer')">✅ Ответ</button>
    </div>
    <div id="tabContent" class="${activeTab === 'answer' ? 'answer-text' : 'text'}">${
      activeTab === 'answer' ? formatAnswer(answer) : t.text
    }</div>
    <div class="nav-bar">
      <button ${!prev ? 'disabled' : ''} onclick="showTicket(${num - 1}, '${activeTab}')">← Пред.</button>
      <button onclick="hideTicket()">К списку</button>
      <button ${!next ? 'disabled' : ''} onclick="showTicket(${num + 1}, '${activeTab}')">След. →</button>
    </div>
  `;
  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function formatAnswer(text) {
  return text
    .replace(/•/g, '•')
    .replace(/→/g, '→')
    .replace(/←/g, '←')
    .replace(/✓/g, '✓')
    .replace(/\n/g, '<br>')
    .replace(/─/g, '─')
    .replace(/×/g, '×');
}

function hideTicket() {
  document.getElementById('detailOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function showMenu() {
  document.getElementById('menu-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('back-to-menu').style.display = 'none';
}

// Close overlay on background click
document.getElementById('detailOverlay').onclick = function(e) {
  if (e.target === this) hideTicket();
};

// Keyboard navigation
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('detailOverlay').classList.contains('open')) return;
  if (e.key === 'Escape') hideTicket();
  const activeTab = document.querySelector('.tab.active')?.textContent?.includes('Ответ') ? 'answer' : 'task';
  if (e.key === 'ArrowLeft' && currentTicket > 1) showTicket(currentTicket - 1, activeTab);
  if (e.key === 'ArrowRight' && currentTicket < 30) showTicket(currentTicket + 1, activeTab);
});
</script>
