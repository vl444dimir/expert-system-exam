<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Экзамен — Экспертные знания и СППР</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  min-height: 100vh;
}
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  color: #fff;
  padding: 28px 24px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,.15);
}
.header h1 { font-size: 28px; margin-bottom: 6px; }
.header p { font-size: 15px; color: #a8b2d1; }
.container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
.section-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 20px;
  color: #1a1a2e;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title .badge {
  background: #0f3460;
  color: #fff;
  font-size: 13px;
  padding: 2px 12px;
  border-radius: 12px;
  font-weight: 500;
}
.ticket-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
  margin-bottom: 40px;
}
.ticket-btn {
  background: #fff;
  border: 2px solid #e1e4e8;
  border-radius: 14px;
  padding: 20px 16px;
  cursor: pointer;
  transition: all .2s;
  text-align: left;
  display: flex;
  flex-direction: column;
  min-height: 100px;
}
.ticket-btn:hover {
  border-color: #0f3460;
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(15,52,96,.15);
}
.ticket-btn:active { transform: translateY(-1px); }
.ticket-btn .num {
  font-size: 26px;
  font-weight: 800;
  color: #0f3460;
  margin-bottom: 6px;
}
.ticket-btn .short {
  font-size: 14px;
  color: #586069;
  line-height: 1.3;
}
.ticket-btn .short strong { color: #1a1a2e; }

.detail-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 100;
  padding: 20px;
  overflow-y: auto;
}
.detail-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
.detail-card {
  background: #fff;
  border-radius: 16px;
  max-width: 800px;
  width: 100%;
  margin: 20px auto;
  padding: 32px;
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
  animation: slideUp .25s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.close-btn {
  position: absolute;
  top: 16px;
  right: 20px;
  font-size: 28px;
  cursor: pointer;
  color: #999;
  background: none;
  border: none;
  line-height: 1;
  padding: 4px 8px;
  border-radius: 8px;
  transition: background .15s;
}
.close-btn:hover { background: #f0f2f5; color: #333; }
.detail-card h2 {
  font-size: 24px;
  color: #0f3460;
  margin-bottom: 20px;
  padding-right: 40px;
}
.detail-card .text {
  font-size: 15px;
  line-height: 1.7;
  color: #24292e;
  white-space: pre-wrap;
}
.criteria-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
  font-size: 14px;
}
.criteria-table th, .criteria-table td {
  border: 1px solid #d0d7de;
  padding: 10px 14px;
  text-align: left;
}
.criteria-table th {
  background: #f6f8fa;
  font-weight: 600;
  color: #24292e;
}
.criteria-table tr:last-child td { font-weight: 700; background: #f6f8fa; }
.criteria-table td:first-child, .criteria-table td:last-child { text-align: center; width: 50px; }
.tabs {
  display: flex;
  gap: 0;
  margin-bottom: 20px;
  border-bottom: 2px solid #e1e4e8;
}
.tab {
  padding: 10px 24px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: #586069;
  border: none;
  background: none;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: all .15s;
}
.tab:hover { color: #0f3460; }
.tab.active {
  color: #0f3460;
  border-bottom-color: #0f3460;
}
.answer-text {
  font-size: 14px;
  line-height: 1.6;
  color: #24292e;
  white-space: pre-wrap;
  font-family: 'Courier New', Consolas, monospace;
  background: #f6f8fa;
  padding: 16px;
  border-radius: 10px;
  overflow-x: auto;
}
.answer-text table {
  border-collapse: collapse;
  margin: 8px 0;
  font-size: 13px;
  width: 100%;
}
.answer-text td, .answer-text th {
  border: 1px solid #d0d7de;
  padding: 6px 10px;
  text-align: left;
}
.answer-text th {
  background: #e8eaef;
  font-weight: 600;
}
.answer-text tr:nth-child(even) { background: #f0f2f5; }
.nav-bar {
  display: flex;
  gap: 12px;
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid #e1e4e8;
}
.nav-bar button {
  flex: 1;
  padding: 12px;
  border: 2px solid #d0d7de;
  border-radius: 10px;
  background: #fff;
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  transition: all .15s;
}
.nav-bar button:hover { border-color: #0f3460; background: #f6f8fa; }
.nav-bar button:disabled { opacity: .4; cursor: default; border-color: #d0d7de; }
#back-to-menu {
  display: none;
  margin-bottom: 16px;
}
#back-to-menu button {
  padding: 10px 20px;
  border: 2px solid #d0d7de;
  border-radius: 10px;
  background: #fff;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all .15s;
}
#back-to-menu button:hover { border-color: #0f3460; }
@media (max-width: 600px) {
  .ticket-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .ticket-btn { padding: 14px 12px; min-height: 80px; }
  .ticket-btn .num { font-size: 22px; }
  .detail-card { padding: 20px; margin: 10px; }
  .header h1 { font-size: 22px; }
  .container { padding: 16px 12px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>📋 Экспертные знания и СППР</h1>
  <p>30 экзаменационных билетов — нажмите на номер для просмотра</p>
</div>

<div class="container">
  <div id="back-to-menu"><button onclick="showMenu()">← Назад к меню</button></div>

  <div id="menu-view">
    <div class="section-title">
      Билеты <span class="badge">30</span>
    </div>
    <div class="ticket-grid" id="ticketGrid"></div>

    <div class="section-title" style="margin-top:20px">
      Критерии оценивания
    </div>
    <div style="background:#fff;border-radius:14px;padding:20px;border:2px solid #e1e4e8">
      <table class="criteria-table" id="criteriaTable"></table>
    </div>
  </div>

  <div id="detail-view" style="display:none">
    <div class="detail-card" id="detailCard"></div>
  </div>
</div>

<div class="detail-overlay" id="detailOverlay">
  <div class="detail-card" id="overlayCard"></div>
</div>

<script>
const tickets = [
  {num:1,short:"Оценка сложности",text:"Для системы оценки сложности разработки программного продукта требуется определить интегральную сложность проекта.\n\nВходные параметры:\n• Объем функциональности (количество модулей: 5–50)\n• Опыт команды (годы: 1–10)\n• Срок реализации (месяцы: 1–12)\n\nЗначения параметров заданы с неопределённостью (например, «средний опыт», «высокая сложность»).\n\nТребуется:\n1. Разработать модель оценки сложности проекта\n2. Определить диапазоны значений и правила агрегирования параметров\n3. Вычислить итоговую оценку сложности\n4. Интерпретировать результат (низкая/средняя/высокая сложность)\n5. Проанализировать влияние изменения одного параметра\n6. Оценить устойчивость модели к изменению входных данных"},
  {num:2,short:"Оценка качества кода",text:"Для системы оценки качества программного кода требуется определить уровень качества.\n\nВходные параметры:\n• Количество дефектов (0–100)\n• Покрытие тестами (%: 0–100)\n• Читаемость кода (оценка 1–10)\n\nТребуется:\n1. Разработать модель оценки качества\n2. Определить шкалы и правила объединения параметров\n3. Получить итоговую оценку качества\n4. Интерпретировать результат\n5. Проанализировать влияние каждого параметра\n6. Оценить устойчивость модели"},
  {num:3,short:"Мониторинг серверов",text:"Для системы мониторинга серверной инфраструктуры требуется определить текущее состояние системы.\n\nВходные параметры:\n• Загрузка CPU (%: 0–100)\n• Использование RAM (%: 0–100)\n• Количество запросов в секунду (10–10000)\n\nТребуется:\n1. Разработать модель определения состояния (норма/нагрузка/перегрузка)\n2. Задать правила обработки параметров\n3. Получить итоговое состояние\n4. Интерпретировать результат\n5. Проанализировать влияние параметров\n6. Оценить устойчивость"},
  {num:4,short:"Приоритет задач",text:"Для системы планирования задач в IT-проекте требуется определить приоритет задач.\n\nВходные параметры:\n• Сложность задачи (1–10)\n• Доступное время (часы: 1–40)\n• Бизнес-ценность (1–10)\n\nТребуется:\n1. Разработать модель определения приоритета\n2. Задать правила\n3. Получить приоритет для набора задач (не менее 5)\n4. Интерпретировать результат\n5. Проанализировать влияние параметров\n6. Оценить устойчивость"},
  {num:5,short:"Распределение задач",text:"Для системы распределения задач между разработчиками требуется минимизировать общее время выполнения.\n\nВходные параметры:\n• Количество разработчиков (3–6)\n• Задачи (5–10)\n• Трудоёмкость задач (часы)\n• Производительность разработчиков (коэффициент 0.5–1.5)\n\nТребуется:\n1. Построить модель оптимального распределения\n2. Найти решение\n3. Интерпретировать результат\n4. Проанализировать влияние параметров\n5. Оценить устойчивость"},
  {num:6,short:"Выбор проектов",text:"Для системы выбора IT-проектов в условиях ограниченного бюджета требуется определить оптимальный набор проектов.\n\nВходные параметры:\n• Бюджет (100–1000 тыс.)\n• Стоимость проектов (50–300 тыс.)\n• Ожидаемая прибыль (100–500 тыс.)\n\nТребуется:\n1. Построить модель оптимизации\n2. Найти решение\n3. Интерпретировать результат\n4. Проанализировать альтернативы\n5. Оценить устойчивость"},
  {num:7,short:"Выбор технологии",text:"Для системы выбора технологии разработки требуется определить наилучшую технологию.\n\nВходные параметры:\n• Производительность (1–10)\n• Сложность освоения (1–10)\n• Востребованность (1–10)\n• Стоимость внедрения (1–10)\n\nРассматриваются не менее 3 альтернатив.\n\nТребуется:\n1. Провести оценку\n2. Получить результат\n3. Интерпретировать его\n4. Проанализировать влияние критериев\n5. Оценить устойчивость"},
  {num:8,short:"Выбор инструмента",text:"Для системы выбора инструмента управления проектами требуется определить оптимальный инструмент.\n\nВходные параметры:\n• Функциональность (1–10)\n• Удобство (1–10)\n• Стоимость (1–10)\n• Интеграции (1–10)\n\nРассматриваются системы (не менее 3).\n\nТребуется:\n1. Провести оценку\n2. Получить результат\n3. Интерпретировать его\n4. Проверить согласованность\n5. Оценить устойчивость"},
  {num:9,short:"Структурный анализ",text:"Для информационной системы, состоящей из взаимосвязанных компонентов, требуется выполнить структурный анализ.\n\nВходные параметры:\n• Список компонентов (не менее 5)\n• Связи между ними (матрица смежности)\n• Входные и выходные данные\n\nТребуется:\n1. Построить модель системы\n2. Интерпретировать структуру\n3. Оценить полноту модели\n4. Проанализировать изменения структуры\n5. Оценить устойчивость"},
  {num:10,short:"Моделирование процесса",text:"Для системы разработки программного обеспечения как бизнес-процесса требуется выполнить моделирование процесса.\n\nВходные параметры:\n• Этапы процесса (анализ, разработка, тестирование, внедрение)\n• Длительность этапов (дни)\n• Участники\n\nТребуется:\n1. Построить модель процесса\n2. Определить последовательность\n3. Интерпретировать результат\n4. Оценить эффективность\n5. Проанализировать изменения этапов\n6. Оценить устойчивость"},
  {num:11,short:"Классификация требований",text:"Для системы управления требованиями к программному обеспечению необходимо выполнить структурирование и классификацию требований проекта.\n\nВходные данные:\n• Список требований (не менее 10)\n• Для каждого указаны параметры: тип (не задан), приоритет (высокий/средний/низкий), степень формализации (0–1), источник (заказчик/разработчик/аналитик)\n\nТребуется:\n1. Разработать модель классификации требований\n2. Распределить их по категориям (функциональные, нефункциональные и др.)\n3. Определить правила классификации и формализовать их\n4. Получить структурированную модель требований\n5. Интерпретировать результат с точки зрения удобства разработки\n6. Проанализировать, как изменение параметра влияет на структуру\n7. Оценить устойчивость модели к неполноте входных данных"},
  {num:12,short:"Эффективность системы",text:"Для системы оценки эффективности информационной системы требуется определить интегральный показатель эффективности.\n\nВходные параметры:\n• Время отклика (мс: 100–2000)\n• Количество ошибок (в час: 0–50)\n• Загрузка CPU (%: 10–100)\n• Загрузка памяти (%: 20–100)\n\nТребуется:\n1. Разработать модель агрегирования показателей\n2. Вычислить итоговую оценку эффективности\n3. Интерпретировать результат (низкая/средняя/высокая эффективность)\n4. Проанализировать влияние каждого параметра\n5. Оценить устойчивость модели при изменении параметра на 10–20%"},
  {num:13,short:"Поведение пользователей",text:"Для системы анализа поведения пользователей веб-приложения требуется классифицировать пользователей.\n\nВходные параметры:\n• Количество сессий в день (1–20)\n• Средняя длительность сессии (минуты)\n• Количество действий (клики)\n• Процент возвратов (%)\n\nТребуется:\n1. Разработать модель распределения пользователей по группам (активные, средние, пассивные)\n2. Определить правила классификации\n3. Получить итоговое распределение пользователей\n4. Интерпретировать результаты с точки зрения бизнеса\n5. Проанализировать влияние изменения одного показателя\n6. Оценить устойчивость классификации"},
  {num:14,short:"Оценка интерфейса",text:"Для системы оценки пользовательского интерфейса требуется определить уровень удобства.\n\nВходные параметры:\n• Время выполнения задачи (сек)\n• Количество ошибок пользователя\n• Субъективная оценка (1–5)\n\nТребуется:\n1. Разработать модель оценки удобства интерфейса\n2. Получить интегральный показатель\n3. Интерпретировать результат (удобный/средний/неудобный интерфейс)\n4. Проанализировать влияние каждого параметра\n5. Оценить устойчивость при изменении субъективной оценки"},
  {num:15,short:"Производительность ПО",text:"Для системы анализа производительности программного обеспечения требуется оценить производительность при различных нагрузках.\n\nВходные параметры:\n• Количество пользователей (10–1000)\n• Время отклика (мс)\n• Пропускная способность (запросов/сек)\n\nТребуется:\n1. Построить модель зависимости производительности от нагрузки\n2. Провести расчёты для нескольких сценариев\n3. Интерпретировать результаты\n4. Проанализировать чувствительность модели\n5. Оценить устойчивость"},
  {num:16,short:"Принятие решений",text:"Для системы поддержки принятия решений в IT-проекте требуется выбрать оптимальное решение.\n\nВходные параметры:\n• Стоимость (тыс. у.е.)\n• Срок реализации (дни)\n• Риск (0–1)\n• Ожидаемая выгода (баллы 1–10)\n\nРассматриваются не менее 3 альтернатив.\n\nТребуется:\n1. Разработать модель выбора\n2. Получить итоговое решение\n3. Интерпретировать его\n4. Проанализировать влияние критериев\n5. Оценить устойчивость при изменении весов"},
  {num:17,short:"Загрузка серверов",text:"Для системы оценки загрузки серверов требуется определить состояние системы.\n\nВходные параметры:\n• CPU (%)\n• RAM (%)\n• Количество запросов/сек\n\nЗадать диапазоны значений и пороговые уровни.\n\nТребуется:\n1. Разработать модель оценки состояния (норма/нагрузка/перегрузка)\n2. Получить результат для заданных значений\n3. Интерпретировать его\n4. Проанализировать влияние параметров\n5. Оценить устойчивость"},
  {num:18,short:"Распределение ресурсов",text:"Для системы распределения ресурсов проекта требуется оптимально распределить ресурсы.\n\nВходные параметры:\n• Количество задач (5–10)\n• Трудоёмкость (часы)\n• Доступные ресурсы (часы)\n• Приоритет (1–3)\n\nТребуется:\n1. Построить модель оптимизации\n2. Найти распределение\n3. Интерпретировать результат\n4. Проанализировать альтернативы\n5. Оценить устойчивость"},
  {num:19,short:"Выбор архитектуры",text:"Для системы выбора архитектуры программного продукта требуется определить оптимальную архитектуру.\n\nВходные параметры:\n• Производительность (1–10)\n• Масштабируемость (1–10)\n• Сложность (1–10)\n• Стоимость (1–10)\n\nРассматриваются 3–4 варианта.\n\nТребуется:\n1. Провести оценку\n2. Получить итоговый выбор\n3. Интерпретировать результат\n4. Проанализировать влияние критериев\n5. Оценить устойчивость"},
  {num:20,short:"Оценка рисков",text:"Для системы управления рисками проекта требуется оценить риски.\n\nВходные параметры:\n• Вероятность (0–1)\n• Влияние (1–10)\n• Обнаруживаемость (1–10)\n\nТребуется:\n1. Рассчитать уровень риска\n2. Интерпретировать результат\n3. Проанализировать влияние параметров\n4. Оценить устойчивость"},
  {num:21,short:"Анализ нагрузки",text:"Для системы анализа нагрузки пользователей на веб-приложение требуется определить уровень нагрузки и состояние системы.\n\nВходные параметры:\n• Количество активных пользователей (100–10 000)\n• Количество запросов в секунду (50–5000)\n• Среднее время отклика (мс: 100–3000)\n• Коэффициент пиковости нагрузки (1–3)\n\nТребуется:\n1. Разработать модель оценки уровня нагрузки (низкая, средняя, высокая, критическая)\n2. Определить правила обработки параметров и их агрегирования\n3. Рассчитать уровень нагрузки для нескольких сценариев\n4. Интерпретировать результаты (необходимость масштабирования)\n5. Проанализировать влияние изменения количества пользователей\n6. Оценить устойчивость модели при изменении параметров на ±15%"},
  {num:22,short:"Планирование спринта",text:"Для системы планирования спринта в IT-команде требуется определить оптимальный набор задач для выполнения.\n\nВходные параметры:\n• Список задач (не менее 8)\n• Трудоёмкость (часы: 2–20)\n• Приоритет (1–5)\n• Доступное время команды (80 часов)\n• Коэффициент неопределенности (0.8–1.2)\n\nТребуется:\n1. Построить модель выбора задач с учетом ограничений\n2. Определить, какие задачи включить в спринт\n3. Получить итоговый список задач\n4. Интерпретировать результат (эффективность планирования)\n5. Проанализировать влияние изменения доступного времени\n6. Оценить устойчивость решения при изменении трудоёмкости"},
  {num:23,short:"Эффективность команды",text:"Для системы оценки эффективности распределения задач между разработчиками требуется определить уровень эффективности команды.\n\nВходные параметры:\n• Количество разработчиков (3–7)\n• Количество задач (10–20)\n• Среднее время выполнения задачи (часы)\n• Загрузка разработчиков (%: 40–100)\n• Количество просроченных задач\n\nТребуется:\n1. Разработать модель оценки эффективности\n2. Определить интегральный показатель\n3. Провести расчёт\n4. Интерпретировать результат (эффективно/неэффективно)\n5. Проанализировать влияние загрузки разработчиков\n6. Оценить устойчивость модели при изменении числа задач"},

  {num:27,short:"Выбор технологии разработки",text:"Для системы выбора технологии разработки программного продукта требуется определить оптимальную технологию.\n\nВходные параметры:\n• Сложность внедрения (1–10)\n• Производительность (1–10)\n• Стоимость (1–10)\n• Доступность специалистов (1–10)\n• Время внедрения (месяцы: 1–12)\n\nРассматриваются не менее 4 альтернатив.\n\nТребуется:\n1. Разработать модель выбора\n2. Провести оценку альтернатив\n3. Получить итоговый выбор\n4. Интерпретировать результат\n5. Проанализировать влияние изменения одного критерия\n6. Оценить устойчивость выбора"},

 только при снижении читаемости до R<5.5 (граничное значение). При изменении остальных параметров на ±15% категория «высокое» сохраняется. Модель умеренно устойчива.\n9. Итоговая таблица\nПараметр\nЗначение\nμ_активн\nДефекты\n15\n0.25\nПокрытие\n78%\n0.90\nЧитаемость\n7\n0.50\nx*\n0.83\nВЫСОКОЕ',
  3: '1. Постановка задачи\nТип: нечёткая логика (Мамдани). Определить состояние системы (норма/нагрузка/перегрузка) по загрузке CPU, RAM и числу запросов/сек.\n2. Входные параметры\nПараметр\nДиапазон\nЕд.\nТермы\nCPU\n0–100\n%\nнорма[0–50], нагрузка[40–80], перегрузка[70–100]\nRAM\n0–100\n%\nнорма[0–60], нагрузка[50–85], перегрузка[75–100]\nЗапросы\n10–10000\nreq/s\nнизко[10–500], средне[300–2000], высоко[1500–10000]\n3. Формальная модель — данные: CPU=65%, RAM=72%, Запросы=450/сек\nCPU=65:  μ_норм=(50-65)<0→0, μ_нагр=(65-40)/(60-40)=1→clamp, μ_перегр=(65-70)<0→0. μ_нагр=1.0\nRAM=72:  μ_норм=0, μ_нагр=(72-50)/(67.5-50)=1→clamp, μ_перегр=(72-75)<0→0. μ_нагр=1.0\nЗапросы=450:  μ_низк=(500-450)/(500-10)=0.10, μ_средн=(450-300)/(1150-300)=0.18, μ_выс=0\nПравило\nАнтецедент\nКонсеквент\nАктивация\nR1\nCPU=нагр И RAM=нагр И Зап=средн\nНагрузка\nmin(1.0,1.0,0.18)=0.18\nR2\nCPU=нагр И RAM=нагр И Зап=низк\nНагрузка\nmin(1.0,1.0,0.10)=0.10\nR3\nCPU=перегр ИЛИ RAM=перегр\nПерегрузка\nmax(0,0)=0\nR4\nCPU=норм И RAM=норм\nНорма\nmin(0,0)=0\nR5\nCPU=нагр И RAM=нагр\nНагрузка\nmin(1.0,1.0)=1.0\nДефаззификация: «Нагрузка» [0.33;0.66], центр=0.5. Агрег. μ=max(0.18,0.10,1.0)=1.0. x*=1.0·0.5/1.0=0.50\n4. Обоснование метода\nНечёткая логика оптимальна для мониторинга: пороги нагрузки нечёткие, переход между состояниями плавный. Пороговая система (if CPU>80%) создаёт жёсткие границы и ложные срабатывания. Источник: Zadeh, 1965; Mamdani, 1975.\n5. Вычисления — ИТОГ\nx*=0.50 → НАГРУЗКА (0.33–0.66)\n6. Интерпретация\nСистема под нагрузкой: CPU и RAM загружены, запросы умеренные. Критического состояния нет. Рекомендация: включить автомасштабирование, добавить кэш (Redis), мониторить в течение 30 мин.\n7. Анализ влияния параметров\nПараметр\nИсх.\nРезультат\n+20%\nРез.\n-20%\nРез.\nCPU\n65%\n0.50 (нагр)\n78%\n0.55 (нагр)\n52%\n0.40 (нагр)\nRAM\n72%\n0.50 (нагр)\n86.4%\n0.65 (нагр→перегр)\n57.6%\n0.42 (нагр)\nЗапросы\n450\n0.50 (нагр)\n540\n0.50 (нагр)\n360\n0.50 (нагр)\nНаиболее влиятельный: RAM (при +20% подходит к перегрузке). Наименее: Запросы.\n8. Оценка устойчивости\nКатегория «нагрузка» устойчива при ±15% для CPU и Запросов. Граничное значение для RAM: 85% → переход в «перегрузку». Модель устойчива для CPU/Запросов, чувствительна к RAM.\n9. Итоговая таблица\nПараметр\nЗначение\nСостояние\nCPU\n65%\nНагрузка\nRAM\n72%\nНагрузка\nЗапросы\n450/сек\nНизко-Средне\nИтог x*\n0.50\nНАГРУЗКА',
  4: '1. Постановка задачи\nТип: нечёткая логика (Мамдани). Определить приоритет задачи (низкий/средний/высокий) по сложности, доступному времени и бизнес-ценности. Вычислить для 5 задач.\n2. Входные параметры\nПараметр\nДиапазон\nЕд.\nТермы\nСложность (S)\n1–10\nбалл\nнизкая[1–4], средняя[3–7], высокая[6–10]\nВремя (T)\n1–40\nчасы\nмало[1–15], средне[10–30], много[25–40]\nЦенность (V)\n1–10\nбалл\nнизкая[1–4], средняя[3–7], высокая[6–10]\n3. Формальная модель — правила и расчёт для 5 задач\n№\nS\nT\nV\nμ_S\nμ_T\nμ_V\nПравило\nПриоритет\nЗ1\n8\n10\n9\nвыс=0.67\nмало=0.67\nвыс=1.0\nR1: выс+мало+выс→высок\nmin=0.67→0.78\nЗ2\n3\n25\n4\nнизк=0.5\nсредн=0.5\nнизк=0.5\nR2: низк+средн+низк→низк\nmin=0.5→0.25\nЗ3\n5\n15\n7\nсредн=0.67\nсредн=0.33\nсредн+выс\nR3: средн+средн→средн\n0.5→0.50\nЗ4\n9\n5\n8\nвыс=1.0\nмало=1.0\nвыс=0.67\nR1→высок\nmin=0.67→0.78\nЗ5\n2\n35\n3\nнизк=0.67\nмного=0.5\nнизк=0.67\nR4: низк+много+низк→низк\nmin=0.5→0.22\n4. Обоснование метода\nНечёткая логика позволяет учитывать субъективные оценки (бизнес-ценность, сложность) без жёстких порогов. Весовая сумма игнорирует нелинейные взаимодействия. Источник: Bellman & Zadeh, 1970.\n5. Вычисления — ИТОГ\nЗадача\nx*\nКатегория\nЗ1\n0.78\nВЫСОКИЙ\nЗ2\n0.25\nНИЗКИЙ\nЗ3\n0.50\nСРЕДНИЙ\nЗ4\n0.78\nВЫСОКИЙ\nЗ5\n0.22\nНИЗКИЙ\n6. Интерпретация\nЗ1 и З4 — высокий приоритет (высокая ценность + высокая сложность + мало времени → нужно делать срочно). З2, З5 — откладываем. Рекомендация: начать с З4 (максимальная активация).\n7. Анализ влияния параметров (для З1)\nПараметр\nИсх.\nРезультат\n+20%\nРез.\n-20%\nРез.\nСложность\n8\n0.78 (выс)\n9.6\n0.82 (выс)\n6.4\n0.70 (выс)\nВремя\n10\n0.78 (выс)\n12\n0.72 (выс)\n8\n0.80 (выс)\nЦенность\n9\n0.78 (выс)\n10\n0.80 (выс)\n7.2\n0.72 (выс)\n8. Оценка устойчивости\nКатегория «высокий» для З1 сохраняется при всех вариациях ±20%. Граничное значение перехода в «средний»: x*<0.66, достигается при V<5 или S<5. Модель устойчива.\n9. Итоговая таблица\nЗадача\nS\nT\nV\nПриоритет\nЗ1\n8\n10\n9\nВЫСОКИЙ\nЗ2\n3\n25\n4\nНИЗКИЙ\nЗ3\n5\n15\n7\nСРЕДНИЙ\nЗ4\n9\n5\n8\nВЫСОКИЙ\nЗ5\n2\n35\n3\nНИЗКИЙ',
  5: '1. Постановка задачи\nТип: задача назначений (целочисленная оптимизация). Минимизировать суммарное время выполнения задач 4 разработчиками при заданной трудоёмкости и производительности.\n2. Входные параметры\nПараметр\nДиапазон\nЕд.\nЗначение\nРазработчики\n3–6\nчел\n4 (Р1–Р4)\nЗадачи\n5–10\nшт\n6 (З1–З6)\nТрудоёмкость\n—\nчасы\nЗ1=8, З2=5, З3=12, З4=6, З5=10, З6=4\nПроизводительность\n0.5–1.5\nкоэф.\nР1=1.2, Р2=1.0, Р3=0.8, Р4=1.5\n3. Формальная модель\nЦелевая функция: min Z = Σᵢ Σⱼ xᵢⱼ · (tⱼ / pᵢ)\nОграничения: Σⱼ xᵢⱼ·(tⱼ/pᵢ) ≤ 16 ч (рабочий день) для каждого i; Σᵢ xᵢⱼ = 1 для каждой j; xᵢⱼ ∈ {0,1}\n4. Обоснование метода\nЖадный алгоритм: сортировка задач по трудоёмкости (убывание), назначение на разработчика с наибольшей производительностью среди наименее загруженных. Оптимальный для задач назначений при однородных ограничениях.\n5. Вычисления — жадный алгоритм\nСортируем задачи по трудоёмкости: З3=12, З5=10, З1=8, З4=6, З2=5, З6=4\nИтерация\nЗадача\nНазначен\nФакт.время\nСуммарная нагрузка\n1\nЗ3 (12ч)\nР4(×1.5)\n12/1.5=8.0ч\nР4=8.0\n2\nЗ5 (10ч)\nР1(×1.2)\n10/1.2=8.3ч\nР1=8.3\n3\nЗ1 (8ч)\nР2(×1.0)\n8/1.0=8.0ч\nР2=8.0\n4\nЗ4 (6ч)\nР3(×0.8)\n6/0.8=7.5ч\nР3=7.5\n5\nЗ2 (5ч)\nР4(×1.5)\n5/1.5=3.3ч\nР4=11.3\n6\nЗ6 (4ч)\nР2(×1.0)\n4/1.0=4.0ч\nР2=12.0\nmax загрузка = 12.0ч (Р2) → минимизируем makespan\n6. Интерпретация\nВсе 6 задач распределены в рамках рабочего дня (16ч). Наиболее загружен Р2 (12ч). Суммарная загрузка равномерна. Рекомендация: Р4 — ключевой разработчик, не ставить на параллельные проекты.\n7. Анализ влияния параметров\nПараметр\nИсх.\nMakespan\n+20%\nНовый\n-20%\nНовый\nТрудоёмкость З3\n12ч\n12.0ч\n14.4ч\n13.6ч\n9.6ч\n10.8ч\nПроизводит. Р2\n1.0\n12.0ч\n1.2\n10.0ч\n0.8\n15.0ч\nЧисло задач\n6\n12.0ч\n7 (+4ч)\n15.7ч\n5 (-З6)\n9.3ч\n8. Оценка устойчивости\nПри снижении производительности Р2 до 0.7 (>14%) нарушается ограничение 16ч. Граничное значение: p_Р2=0.75. Модель чувствительна к производительности слабейшего разработчика.\n9. Итоговая таблица\nРазработчик\nЗадачи\nФакт.часы\nЗагрузка\nР1 (×1.2)\nЗ5\n8.3\n52%\nР2 (×1.0)\nЗ1,З6\n12.0\n75%\nР3 (×0.8)\nЗ4\n7.5\n47%\nР4 (×1.5)\nЗ3,З2\n11.3\n71%',
  6: '1. Постановка задачи\nТип: задача о ранце (целочисленная оптимизация). Выбрать набор IT-проектов, максимизирующий суммарную прибыль при ограниченном бюджете.\n2. Входные параметры\nПараметр\nДиапазон\nЕд.\nЗначения\nБюджет\n100–1000\nтыс.\n500 тыс.\nСтоимость проектов\n50–300\nтыс.\nП1=150, П2=200, П3=120, П4=80, П5=250\nОжидаемая прибыль\n100–500\nтыс.\nП1=300, П2=350, П3=200, П4=180, П5=400\n3. Формальная модель\nmax Z = 300x₁ + 350x₂ + 200x₃ + 180x₄ + 400x₅\ns.t.: 150x₁ + 200x₂ + 120x₃ + 80x₄ + 250x₅ ≤ 500\nxᵢ ∈ {0,1}\n4. Обоснование метода\nЖадный алгоритм по соотношению прибыль/стоимость: быстрое субоптимальное решение, приемлемо при n≤10. Полный перебор 2⁵=32 варианта также возможен. Источник: Bellman, 1957 (динамическое программирование).\n5. Вычисления\nПроект\nСтоим.\nПрибыль\nПрибыль/Стоим.\nРанг\nП4\n80\n180\n2.25\n1\nП1\n150\n300\n2.00\n2\nП5\n250\n400\n1.60\n3\nП2\n200\n350\n1.75\n—\nП3\n120\n200\n1.67\n—\nЖадный: Берём П4(80)+П1(150)=230. Остаток=270. Берём П2(200)? 230+200=430≤500 ✓. Остаток=70<80(П4 уже взят). Итог: П4+П1+П2=430тыс., прибыль=180+300+350=830тыс.\nПроверка П4+П1+П5: 80+150+250=480≤500, прибыль=180+300+400=880тыс. ЛУЧШЕ!\nИТОГ: П1+П4+П5, затраты=480тыс., прибыль=880тыс., ROI=83%\n6. Интерпретация\nОптимальный портфель: 3 проекта из 5. Оставшийся бюджет=20тыс. (резерв). Рекомендация: П2 и П3 перенести на следующий квартал.\n7. Анализ влияния параметров\nПараметр\nИсх.\nПрибыль\n+20%\nПрибыль\n-20%\nПрибыль\nБюджет\n500\n880\n600\n880+П3=1080\n400\nП1+П4=480\nПрибыль П5\n400\n880\n480\n880+80\n320\nП2 вместо П5→830\nСтоим. П5\n250\n880\n300→П1+П4+П2=830\n830\n200→все4=710+330\n—\n8. Оценка устойчивости\nНабор П1+П4+П5 оптимален при бюджете ≥480тыс. Граничное значение: при бюджете <480 выбор меняется на П1+П4+П2=430. Модель устойчива при вариации бюджета >±4%.\n9. Итоговая таблица\nПроект\nВключён\nСтоим.\nПрибыль\nП1\nДА\n150\n300\nП2\nнет\n—\n—\nП3\nнет\n—\n—\nП4\nДА\n80\n180\nП5\nДА\n250\n400\nИТОГО\n—\n480\n880',
  7: '1. Постановка задачи\nТип: МАИ (метод аналитической иерархии). Выбрать лучшую технологию разработки из 3 альтернатив (React, Vue, Angular) по 4 критериям.\n2. Входные параметры\nКритерий\nДиапазон\nАльтернативы\nПроизводительность\n1–10\nReact=9, Vue=7, Angular=8\nСложность освоения\n1–10\nReact=7, Vue=9, Angular=5\nВостребованность\n1–10\nReact=9, Vue=6, Angular=7\nСтоимость внедрения\n1–10 (10=дёшево)\nReact=6, Vue=8, Angular=5\n3. Матрица попарных сравнений критериев (шкала Саати 1–9)\nКритерий\nПроизв.\nСложность\nВостреб.\nСтоим.\nПроизводительность\n1\n3\n2\n4\nСложность\n1/3\n1\n1/2\n2\nВостребованность\n1/2\n2\n1\n3\nСтоимость\n1/4\n1/2\n1/3\n1\nНормировка (сумма столбцов: 2.08, 6.5, 3.83, 10)\nКритерий\nПроизв.\nСложн.\nВостреб.\nСтоим.\nВес wᵢ\nПроизводительность\n0.481\n0.462\n0.522\n0.400\n0.466\nСложность\n0.160\n0.154\n0.131\n0.200\n0.161\nВостребованность\n0.240\n0.308\n0.261\n0.300\n0.277\nСтоимость\n0.120\n0.077\n0.087\n0.100\n0.096\n4. Обоснование метода\nМАИ (Saaty, 1980): структурирует многокритериальный выбор, позволяет учитывать субъективные оценки экспертов через попарные сравнения. Альтернативы — ELECTRE, TOPSIS — сложнее, нечёткая логика неприменима (нет нечёткости).\n5. Вычисления — оценка альтернатив\nАльтернатива\nw₁=0.466\nw₂=0.161\nw₃=0.277\nw₄=0.096\nИтог\nReact\n9×0.466=4.19\n7×0.161=1.13\n9×0.277=2.49\n6×0.096=0.58\n8.39\nVue\n7×0.466=3.26\n9×0.161=1.45\n6×0.277=1.66\n8×0.096=0.77\n7.14\nAngular\n8×0.466=3.73\n5×0.161=0.81\n7×0.277=1.94\n5×0.096=0.48\n6.96\nλmax: (2.08×0.466+6.5×0.161+3.83×0.277+10×0.096)=0.97+1.05+1.06+0.96=4.04\nИС = (4.04−4)/(4−1) = 0.013; СС(n=4)=0.90; ОС = 0.013/0.90 = 0.015 ≤ 0.10 ✓\n6. Интерпретация\nReact (8.39) — лучший выбор: высокая производительность и востребованность перевешивают более сложное освоение. Vue второй (7.14). Angular — наименее предпочтителен.\n7. Анализ влияния параметров\nИзменение\nЛидер\nИтог React\nw₁(произв.) +20%→0.559\nReact\n9.22 (всё ещё лидер)\nw₂(сложн.) +20%→0.193\nReact\n8.22 (лидер)\nw₃(востреб.) +20%→0.332\nReact\n8.56 (лидер)\n8. Оценка устойчивости\nReact остаётся лидером при любом одиночном изменении весов на ±20%. Граничное значение: React уступает Vue только если w₂(сложность)>0.45 — маловероятно. Решение устойчиво.\n9. Итоговая таблица\nТехнология\nИтоговый балл\nРанг\nReact\n8.39\n1 ✓\nVue\n7.14\n2\nAngular\n6.96\n3',
  8: '1. Постановка задачи\nТип: МАИ. Выбрать оптимальный инструмент управления проектами из 3 систем (Jira, Trello, Asana) по 4 критериям.\n2. Входные параметры\nКритерий\nJira\nTrello\nAsana\nФункциональность (1–10)\n9\n6\n8\nУдобство (1–10)\n6\n9\n8\nСтоимость (10=дёшево)\n4\n9\n7\nИнтеграции (1–10)\n9\n5\n7\n3. Матрица сравнений критериев + нормировка\nКрит.\nФункц.\nУдобство\nСтоим.\nИнтегр.\nВес wᵢ\nФункциональность\n1\n2\n4\n1\n0.355\nУдобство\n1/2\n1\n3\n1/2\n0.194\nСтоимость\n1/4\n1/3\n1\n1/4\n0.082\nИнтеграции\n1\n2\n4\n1\n0.355\nСумма\n2.75\n5.33\n12\n2.75\n—\n4. Обоснование метода\nМАИ (Saaty, 1980): 4 критерия разной природы (качество, цена, удобство) требуют попарного сравнения. Нечёткая модель не подходит — критерии чётко измеримы. Взвешенная сумма игнорирует транзитивность предпочтений.\n5. Вычисления\nАльтернатива\nФункц.×0.355\nУдобство×0.194\nСтоим.×0.082\nИнтегр.×0.355\nИтог\nJira\n9×0.355=3.20\n6×0.194=1.16\n4×0.082=0.33\n9×0.355=3.20\n7.89\nTrello\n6×0.355=2.13\n9×0.194=1.75\n9×0.082=0.74\n5×0.355=1.78\n6.40\nAsana\n8×0.355=2.84\n8×0.194=1.55\n7×0.082=0.57\n7×0.355=2.49\n7.45\nλmax≈4.02; ИС=0.007; ОС=0.007/0.90=0.008 ≤ 0.10 ✓\n6. Интерпретация\nJira (7.89) — победитель: высокая функциональность и интеграции критичны для IT-команды. Asana (7.45) — хорошая альтернатива при ограниченном бюджете. Trello подходит только для простых проектов.\n7. Анализ влияния параметров\nИзменение веса\nЛидер\nИтог Jira\nw_стоим. +20%→0.098\nJira\n7.70\nw_удобство +20%→0.233\nAsana→лидер\nAsana 7.60\nw_функц. -20%→0.284\nJira\n7.40\n8. Оценка устойчивости\nПри повышении веса «Удобства» до 0.25+ Asana обгоняет Jira. Граничное значение w_удобство=0.23. Для IT-проектов функциональность важнее — Jira остаётся выбором.\n9. Итоговая таблица\nИнструмент\nБалл МАИ\nРанг\nJira\n7.89\n1 ✓\nAsana\n7.45\n2\nTrello\n6.40\n3',
  9: '1. Постановка задачи\nТип: структурный анализ (граф + матрица смежности). Построить модель ИС из 6 компонентов, определить ключевые узлы и оценить устойчивость.\n2. Входные параметры — компоненты ИС\nID\nКомпонент\nТип\nОписание\nК1\nWeb-клиент\nUI\nБраузерный интерфейс\nК2\nAPI Gateway\nСервис\nМаршрутизация запросов\nК3\nAuth Service\nСервис\nАутентификация\nК4\nBusiness Logic\nСервис\nОсновная логика\nК5\nDatabase\nХранилище\nPostgreSQL\nК6\nCache\nХранилище\nRedis\n3. Матрица смежности (1=связь)\nК1\nК2\nК3\nК4\nК5\nК6\nΣвых\nК1\n0\n1\n0\n0\n0\n0\n1\nК2\n0\n0\n1\n1\n0\n0\n2\nК3\n0\n0\n0\n1\n1\n0\n2\nК4\n0\n0\n0\n0\n1\n1\n2\nК5\n0\n0\n0\n0\n0\n0\n0\nК6\n0\n0\n0\n0\n0\n0\n0\nΣвх\n0\n1\n1\n2\n2\n1\nИтого 7\n4. Обоснование метода\nМатрица смежности + теория графов (Berge, 1958): стандартный инструмент для анализа связности ИС. МАИ не применим — нет альтернатив. Нечёткая логика не нужна — структура чёткая.\n5. Анализ степеней вершин\nКомпонент\nВх.степень\nИсх.степень\nСуммарная\nРоль\nК1\n0\n1\n1\nИсточник\nК2\n1\n2\n3\nТранзитный\nК3\n1\n2\n3\nТранзитный\nК4\n2\n2\n4\nКЛЮЧЕВОЙ УЗЕЛ\nК5\n2\n0\n2\nСток\nК6\n1\n0\n1\nСток\nК4 (Business Logic) — ключевой узел: степень 4, все запросы проходят через него.\n6. Интерпретация\nК4 — единая точка отказа (SPOF). При его сбое: К5 и К6 недоступны, бизнес-функции не работают. Рекомендация: кластеризация К4, балансировщик нагрузки, дублирование.\n7. Анализ влияния параметров\nУдалён узел\nКомпоненты без связи\nКритичность\nК1 (UI)\n—\nНизкая (только ввод)\nК2 (Gateway)\nК3,К4,К5,К6\nКРИТИЧЕСКАЯ\nК4 (BL)\nК5,К6\nВЫСОКАЯ\nК5 (DB)\n—\nВысокая (потеря данных)\n8. Оценка устойчивости\nГраф связен (все узлы достижимы из К1). Критические точки: К2 и К4. Удаление К2 → система полностью недоступна. Необходимо резервирование К2 и К4. Связность: коэффициент=7/30=0.23 (слабосвязная, линейная архитектура).\n9. Итоговая таблица\nМетрика\nЗначение\nЧисло компонентов\n6\nЧисло связей\n7\nПлотность графа\n0.23\nКлючевой узел\nК4 (степень 4)\nSPOF\nК2, К4\nРекомендация\nДублировать К2 и К4',
  10: '1. Постановка задачи\nТип: сетевое моделирование (критический путь + диаграмма Ганта). Смоделировать процесс разработки ПО, определить критический путь и общую длительность.\n2. Входные параметры — этапы процесса\nЭтап\nДлит.(дни)\nПредшественник\nУчастники\nАнализ требований\n10\n—\nАналитик, Заказчик\nПроектирование\n8\nАнализ\nАрхитектор\nРазработка\n20\nПроектирование\n3 разработчика\nТестирование\n10\nРазработка\nQA, 2 тестировщика\nВнедрение\n5\nТестирование\nDevOps\nДокументация\n6\nПроектирование (параллельно)\nТехнический писатель\n3. Сетевой граф и критический путь\nРанние старты (ES) и окончания (EF):\nЭтап\nES\nEF\nLS\nLF\nРезерв\nАнализ\n0\n10\n0\n10\n0 ←КП\nПроектирование\n10\n18\n10\n18\n0 ←КП\nДокументация\n18\n24\n27\n33\n9\nРазработка\n18\n38\n18\n38\n0 ←КП\nТестирование\n38\n48\n38\n48\n0 ←КП\nВнедрение\n48\n53\n48\n53\n0 ←КП\nКритический путь: Анализ→Проектирование→Разработка→Тестирование→Внедрение = 53 дня\n4. Обоснование метода\nМетод критического пути (CPM, Kelly & Walker, 1959): стандарт для управления IT-проектами. МАИ неприменим — нет выбора альтернатив. Нечёткая логика — для неопределённых длительностей (PERT).\n5. Диаграмма Ганта (ASCII)\nЭтап\n1-10\n11-18\n19-38\n39-48\n49-53\nАнализ\n████████\nПроектирование\n████████\nДокументация\n████\nРазработка\n████████████████████\nТестирование\n████████\nВнедрение\n████\n6. Интерпретация\nОбщий срок = 53 рабочих дня (≈11 недель). Документация имеет резерв 9 дней — можно оптимизировать. Разработка (20 дней) — узкое место. Рекомендация: параллельное тестирование с разработкой сократит срок до 45 дней.\n7. Анализ влияния параметров\nЭтап\nИсх.(дни)\nСрок проекта\n+20%\nНовый срок\n-20%\nНовый срок\nРазработка\n20\n53\n24\n57\n16\n49\nАнализ\n10\n53\n12\n55\n8\n51\nТестирование\n10\n53\n12\n55\n8\n51\n8. Оценка устойчивости\nСрок проекта чувствителен к длительности разработки (самый длинный этап КП). Увеличение разработки на 1 день = +1 день к проекту. Граничное значение: если разработка >30 дней, проект выходит за 60-дневный дедлайн.\n9. Итоговая таблица\nМетрика\nЗначение\nКритический путь\n53 дня\nЧисло этапов\n6\nЭтапов на КП\n5\nМаксимальный резерв\n9 дней (Документация)\nУзкое место\nРазработка (20 дней)',
  11: '1. Постановка задачи\nТип: таксономия + матрица классификации. Структурировать и классифицировать 10 требований по типу, приоритету и источнику.\n2. Входные параметры — требования\nID\nТребование\nПриоритет\nФормализация\nИсточник\nТ1\nСистема должна авторизовать пользователей\nВысокий\n0.9\nЗаказчик\nТ2\nВремя отклика <2сек\nВысокий\n0.8\nАналитик\nТ3\nИнтерфейс на русском языке\nСредний\n0.7\nЗаказчик\nТ4\nДанные шифруются AES-256\nВысокий\n0.95\nАналитик\nТ5\nСистема работает 24/7\nВысокий\n0.85\nЗаказчик\nТ6\nЭкспорт отчётов в PDF\nСредний\n0.6\nЗаказчик\nТ7\nПоддержка 1000 пользователей\nСредний\n0.75\nРазработчик\nТ8\nREST API для интеграций\nНизкий\n0.5\nРазработчик\nТ9\nЛогирование действий\nСредний\n0.7\nАналитик\nТ10\nИнтерфейс адаптивный (mobile)\nНизкий\n0.4\nЗаказчик\n3. Правила классификации\nФункциональные (Ф): описывают действия системы (глаголы: авторизовать, экспортировать, предоставить)\nНефункциональные (НФ): ограничения и атрибуты качества (производительность, безопасность, доступность)\nТехнические (Т): архитектурные решения (API, протоколы, технологии)\n4. Обоснование метода\nТаксономия IEEE 830 (Wiegers, 2003): стандарт классификации требований. Нечёткая логика применима, но избыточна для структурированных текстовых данных.\n5. Классификация\nID\nТип\nПодтип\nПриоритет\nСтатус\nТ1\nФункциональное\nАутентификация\nВысокий\nОбязательное\nТ2\nНефункциональное\nПроизводительность\nВысокий\nОбязательное\nТ3\nНефункциональное\nЛокализация\nСредний\nЖелательное\nТ4\nНефункциональное\nБезопасность\nВысокий\nОбязательное\nТ5\nНефункциональное\nНадёжность\nВысокий\nОбязательное\nТ6\nФункциональное\nОтчётность\nСредний\nЖелательное\nТ7\nНефункциональное\nМасштабируемость\nСредний\nЖелательное\nТ8\nТехническое\nИнтеграция\nНизкий\nОпциональное\nТ9\nФункциональное\nАудит\nСредний\nЖелательное\nТ10\nНефункциональное\nЮзабилити\nНизкий\nОпциональное\n6. Интерпретация\nРаспределение: Ф=3 (30%), НФ=6 (60%), Тех=1 (10%). Высокоприоритетных=4. Рекомендация: начать реализацию с Т1,Т4,Т5 (безопасность и доступность), затем Т2.\n7. Анализ влияния параметров\nИзменение\nЭффект\nТ6 приоритет: Средний→Высокий\n4→5 обязательных, MoSCoW: Must+5\nТ8 источник: Разработ.→Заказчик\nТип не меняется, приоритет может вырасти\nТ3 формализация: 0.7→0.4\nТребует уточнения, риск неполноты\n8. Оценка устойчивости\nКлассификация устойчива к изменению приоритетов. Изменение типа требования (Ф↔НФ) возможно для Т9 (логирование — функционал или аудит). Граничный случай: Т8 может стать функциональным при детализации.\n9. Итоговая матрица\nТип\nВысокий\nСредний\nНизкий\nИтого\nФункциональное\n1(Т1)\n2(Т6,Т9)\n0\n3\nНефункциональное\n3(Т2,Т4,Т5)\n2(Т3,Т7)\n1(Т10)\n6\nТехническое\n0\n0\n1(Т8)\n1\nИТОГО\n4\n4\n2\n10',
  12: '1. Постановка задачи\nТип: нечёткая логика (Мамдани). Определить интегральный показатель эффективности ИС по времени отклика, числу ошибок, загрузке CPU и памяти.\n2. Входные параметры\nПараметр\nДиапазон\nДанные\nТермы\nОтклик (мс)\n100–2000\n350\nнизкий[100–500], средний[400–1200], высокий[1000–2000]\nОшибки/час\n0–50\n8\nмало[0–10], средне[8–25], много[20–50]\nCPU (%)\n10–100\n45\nнорма[10–50], нагрузка[40–75], перегрузка[65–100]\nRAM (%)\n20–100\n55\nнорма[20–55], нагрузка[45–80], перегрузка[70–100]\n3. Функции принадлежности — вычисление μ\nПараметр\nЗначение\nμ_хорошо\nμ_средне\nμ_плохо\nОтклик\n350мс\nμ_низк=(500-350)/400=0.375\nμ_средн=0\n0\nОшибки\n8/ч\nμ_мало=(10-8)/10=0.20\nμ_средн=(8-8)/(17-8)=0\n0\nCPU\n45%\nμ_норм=(50-45)/40=0.125\nμ_нагр=(45-40)/17.5=0.286\n0\nRAM\n55%\nμ_норм=(55-55)/35=0\nμ_нагр=(55-45)/17.5=0.571\n0\nПравило\nАнтецедент\nЭффект\nАктивация\nR1\nОтклик=норм И Ошибки=мало\nВысокая\nmin(0.375,0.20)=0.20\nR2\nCPU=норм И RAM=норм\nВысокая\nmin(0.125,0)=0\nR3\nCPU=нагр И RAM=нагр\nСредняя\nmin(0.286,0.571)=0.286\nR4\nОтклик=средн И Ошибки=средн\nСредняя\nmin(0,0)=0\nR5\nОтклик=норм И CPU=нагр\nСредняя\nmin(0.375,0.286)=0.286\nДефаззификация: «Высокая» центр=0.83, μ=0.20. «Средняя» центр=0.50, μ=max(0.286,0.286)=0.286. x*=(0.20×0.83+0.286×0.50)/(0.20+0.286)=(0.166+0.143)/0.486=0.636\n4. Обоснование метода\nНечёткая логика позволяет агрегировать разнородные метрики (мс, %, шт) с разными шкалами через лингвистические термы. Взвешенная сумма требует нормировки и линейности.\n5. ИТОГ\nx*=0.636 → СРЕДНЯЯ эффективность (граница 0.33–0.66)\n6. Интерпретация\nИС работает удовлетворительно. Низкое число ошибок и приемлемый отклик, но RAM под нагрузкой. Рекомендация: оптимизировать кэширование, снизить RAM до нормы.\n7. Анализ влияния параметров\nПараметр\nИсх.\nx*\n+20%\nx*\n-20%\nx*\nОтклик\n350мс\n0.636\n420мс\n0.580\n280мс\n0.680\nОшибки\n8\n0.636\n9.6\n0.620\n6.4\n0.658\nCPU\n45%\n0.636\n54%\n0.598\n36%\n0.660\nRAM\n55%\n0.636\n66%\n0.550 ←перегр\n44%\n0.660\n8. Оценка устойчивости\nПри RAM>66% (порог нагрузки→перегрузка) x* снижается до ~0.55 — категория остаётся «средняя». Переход в «низкую» эффективность при x*<0.33 требует одновременного ухудшения всех параметров. Модель устойчива.\n9. Итоговая таблица\nПараметр\nЗначение\nТерм\nμ\nОтклик\n350мс\nНорма\n0.375\nОшибки\n8/ч\nМало\n0.200\nCPU\n45%\nНагрузка\n0.286\nRAM\n55%\nНагрузка\n0.571\nИтог x*\n0.636\nСРЕДНЯЯ\n—',
  13: '1. Постановка задачи\nТип: нечёткая логика (Мамдани). Классифицировать пользователей веб-приложения на активных/средних/пассивных по 4 поведенческим метрикам.\n2. Входные параметры\nПараметр\nДиапазон\nТермы\nСессии/день\n1–20\nредкие[1–5], средние[4–12], частые[10–20]\nДлит. сессии (мин)\n1–60\nкороткая[1–15], средняя[10–35], длинная[25–60]\nДействия (кликов)\n1–200\nмало[1–50], средне[30–120], много[80–200]\nВозвраты (%)\n0–100\nнизкие[0–30], средние[20–60], высокие[50–100]\n3. Модель — данные: Сессии=8, Длит=25мин, Клики=70, Возвраты=65%\nПараметр\nЗначение\nμ_низк/ред\nμ_средн\nμ_выс/часто\nСессии\n8\n0\n(8-4)/8=0.5\n0\nДлит\n25мин\n0\n(25-10)/25=0.6\n(25-25)/35=0\nКлики\n70\n0\n(70-30)/90=0.44\n0\nВозвраты\n65%\n0\n(65-20)/40=1→clamp\n(65-50)/50=0.30\nПравило\nАнтецедент\nГруппа\nАктивация\nR1\nСессии=средн И Длит=средн\nСредний\nmin(0.5,0.6)=0.5\nR2\nКлики=средн И Возвр=высок\nСредний\nmin(0.44,0.30)=0.30\nR3\nСессии=часто И Клики=много\nАктивный\n0\nR4\nСессии=редк И Клики=мало\nПассивный\n0\nR5\nСессии=средн И Возвр=высок\nСредний\nmin(0.5,0.30)=0.30\nx*: «Средний»=0.50, μ=max(0.5,0.30,0.30)=0.50. x*=0.50 → СРЕДНИЙ пользователь\n4. Обоснование\nНечёткая логика: поведенческие метрики пользователей имеют нечёткие границы (нет чёткого порога между «активным» и «средним»). K-means требует большого датасета.\n5. ИТОГ\nПользователь → СРЕДНИЙ. Регулярно посещает, умеренно активен.\n6. Интерпретация\nСредний пользователь: посещает 8 раз/день, умеренная активность, высокий процент возвратов (65%). Рекомендация: персонализированные push-уведомления для перевода в «активный» сегмент.\n7. Анализ влияния параметров\nПараметр\nИсх.\nРез.\n+20%\nРез.\n-20%\nРез.\nСессии\n8\n0.50\n9.6\n0.52\n6.4\n0.45\nКлики\n70\n0.50\n84\n0.55\n56\n0.44\nВозвраты\n65%\n0.50\n78%→актив.?\n0.58\n52%\n0.42\n8. Оценка устойчивости\nКатегория «средний» устойчива при вариациях ±20%. Переход в «активный» требует сессий>13 И кликов>90. Модель устойчива.\n9. Итог\nМетрика\nЗначение\nТерм\nСессии/день\n8\nСредние\nДлит. сессии\n25мин\nСредняя\nКлики\n70\nСредне\nВозвраты\n65%\nВысокие\nИтог\n0.50\nСРЕДНИЙ',
  14: '1. Постановка задачи\nТип: нечёткая логика (Мамдани). Определить уровень удобства UI (удобный/средний/неудобный) по времени задачи, числу ошибок и субъективной оценке.\n2. Входные параметры\nПараметр\nДиапазон\nДанные\nТермы\nВремя задачи (сек)\n10–300\n85\nбыстро[10–60], средне[50–150], медленно[120–300]\nОшибки польз.\n0–20\n3\nмало[0–5], средне[3–10], много[8–20]\nСубъект. оценка\n1–5\n4\nнизкая[1–2.5], средняя[2–4], высокая[3–5]\n3. Формальная модель — μ при данных значениях\nВремя=85сек:  μ_быстро=0, μ_средн=(85-50)/(100-50)=0.7, μ_медл=0\nОшибки=3:  μ_мало=(5-3)/5=0.4, μ_средн=(3-3)/(6.5-3)=0, μ_много=0\nОценка=4:  μ_низк=0, μ_средн=(4-2)/(3-2)=1→clamp, μ_выс=(4-3)/(4-3)=1.0\nПравило\nАнтецедент\nКонсеквент\nАктивация\nR1\nВремя=средн И Ошибки=мало\nУдобный\nmin(0.7,0.4)=0.4\nR2\nОценка=высок И Ошибки=мало\nУдобный\nmin(1.0,0.4)=0.4\nR3\nВремя=средн И Оценка=средн\nСредний\nmin(0.7,1.0)=0.7\nR4\nВремя=медл И Ошибки=много\nНеудобный\nmin(0,0)=0\nR5\nОценка=выс И Время=средн\nУдобный\nmin(1.0,0.7)=0.7\nДефаззификация: «Удобный»=0.83, μ=max(0.4,0.4,0.7)=0.7. «Средний»=0.5, μ=0.7. x*=(0.7×0.83+0.7×0.5)/(0.7+0.7)=(0.581+0.35)/1.4=0.665\n4. Обоснование\nНечёткая логика учитывает субъективную оценку (нечёткий ввод) и нелинейные взаимодействия метрик UX. Источник: Zadeh, 1965; Nielsen (эвристики).\n5. ИТОГ\nx*=0.665 ≈ граница УДОБНЫЙ/СРЕДНИЙ. Принимаем: УДОБНЫЙ (>0.60)\n6. Интерпретация\nИнтерфейс практически удобный: умеренное время выполнения, мало ошибок, высокая субъективная оценка. Рекомендация: оптимизировать скорость выполнения задачи (цель < 60 сек).\n7. Анализ влияния параметров\nПараметр\nИсх.\nx*\n+20%\nx*\n-20%\nx*\nВремя задачи\n85сек\n0.665\n102сек\n0.620 (средн)\n68сек\n0.720\nОшибки\n3\n0.665\n3.6\n0.650\n2.4\n0.680\nСубъект.оценка\n4\n0.665\n4.8\n0.720\n3.2\n0.580 (средн)\n8. Оценка устойчивости\nГраничное значение: при времени>100сек или оценке<3.5 категория меняется на «средний». Субъективная оценка — наиболее влиятельный параметр. Граничное значение оценки: 3.3.\n9. Итоговая таблица\nПараметр\nЗначение\nμ_наилучш\nВремя задачи\n85сек\n0.70\nОшибки\n3\n0.40\nСубъект.оценка\n4/5\n1.00\nx*\n0.665\nУДОБНЫЙ',
  15: '1. Постановка задачи\nТип: регрессионная/пороговая модель. Оценить зависимость производительности ПО от нагрузки (числа пользователей) и найти пороговые значения деградации.\n2. Входные параметры\nПараметр\nДиапазон\nЕд.\nСценарии\nПользователи\n10–1000\nчел\n50, 200, 500, 1000\nВремя отклика\n—\nмс\n150, 350, 800, 2200\nПропускная способность\n—\nreq/s\n500, 350, 200, 80\n3. Формальная модель — линейная регрессия\nМодель 1 (время отклика): T(N) = a·N + b\nПо точкам: (50,150),(200,350),(500,800),(1000,2200). МНК: a=(ΣNᵢTᵢ−n·N̄·T̄)/(ΣNᵢ²−n·N̄²)\nВычисление: N̄=437.5, T̄=875. ΣNᵢTᵢ=50×150+200×350+500×800+1000×2200=7500+70000+400000+2200000=2677500\nΣNᵢ²=50²+200²+500²+1000²=2500+40000+250000+1000000=1292500\na=(2677500−4×437.5×875)/(1292500−4×437.5²)=(2677500−1531250)/(1292500−765625)=1146250/526875≈2.175\nb=T̄−a·N̄=875−2.175×437.5=875−951.6=−76.6\nT(N)=2.175N − 76.6 (мс)\n4. Обоснование метода\nЛинейная регрессия (Gauss, 1800-е): наилучшее приближение при монотонной зависимости отклика от нагрузки. Для нелинейного участка (насыщение) применяется логистическая модель. Нечёткая логика не даёт количественный прогноз.\n5. Прогноз и пороги\nСценарий N\nT_факт\nT_модель\nОтклонение\nСтатус\n50\n150мс\n32мс\n−118мс\nНорма\n200\n350мс\n360мс\n+10мс\nНорма\n500\n800мс\n1011мс\n+211мс\nНагрузка\n1000\n2200мс\n2098мс\n−102мс\nПЕРЕГРУЗКА (>2000мс)\nПорог SLA (T≤1000мс): N_max=(1000+76.6)/2.175≈495 пользователей\n6. Интерпретация\nСистема выдерживает до 495 пользователей при SLA 1 сек. При 500+ начинается деградация. Рекомендация: горизонтальное масштабирование при N>400 (упреждающий запас 20%).\n7. Анализ влияния параметров\nN пользователей\nT (мс)\nСтатус\n+20%\nT (мс)\n400\n793мс\nНорма\n480\n967мс (норма)\n495\n1000мс\nГраница SLA\n594\n1215мс (нарушение)\n600\n1228мс\nНагрузка\n720\n1489мс\n8. Оценка устойчивости\nМодель линейная → порог N=495 смещается при изменении коэффициентов. При R²=0.98 модель точна. Нелинейность проявляется при N>700 (реальные данные расходятся). Для N>700 рекомендована степенная модель T=c·Nᵏ.\n9. Итоговая таблица\nМетрика\nЗначение\nМодель\nT=2.175N−76.6\nR²\n≈0.97\nПорог SLA (1000мс)\nN≤495 польз.\nПорог критический (2000мс)\nN≤960 польз.\nРекомендация\nМасштабировать при N>400',
  16: '1. Постановка задачи\nТип: МАИ. Выбрать оптимальное решение из 3 альтернатив (Решение А, Б, В) по критериям: стоимость, срок, риск, выгода.\n2. Входные параметры\nКритерий\nРеш.А\nРеш.Б\nРеш.В\nВес wᵢ\nСтоимость (10=дёшево)\n5\n8\n6\n0.35\nСрок (10=быстро)\n7\n6\n9\n0.25\nРиск (10=безопасно)\n6\n9\n5\n0.30\nВыгода (1–10)\n9\n6\n7\n0.10\n3. Матрица сравнений критериев\nКрит.\nСтоим.\nСрок\nРиск\nВыгода\nВес\nСтоимость\n1\n1.5\n1\n4\n0.350\nСрок\n0.67\n1\n0.67\n3\n0.250\nРиск\n1\n1.5\n1\n3\n0.300\nВыгода\n0.25\n0.33\n0.33\n1\n0.100\nИС=(λmax−n)/(n−1). λmax≈4.02. ИС=0.007. ОС=0.007/0.90=0.008 ≤ 0.10 ✓\n4. Обоснование метода\nМАИ (Saaty, 1980): 4 критерия с разными единицами измерения (тыс.у.е., дни, вероятность, баллы) требуют нормировки через попарные сравнения. Нечёткая логика — для неопределённых данных.\n5. Вычисления\nРеш.\nСтоим.×0.35\nСрок×0.25\nРиск×0.30\nВыгода×0.10\nИтог\nА\n5×0.35=1.75\n7×0.25=1.75\n6×0.30=1.80\n9×0.10=0.90\n6.20\nБ\n8×0.35=2.80\n6×0.25=1.50\n9×0.30=2.70\n6×0.10=0.60\n7.60\nВ\n6×0.35=2.10\n9×0.25=2.25\n5×0.30=1.50\n7×0.10=0.70\n6.55\n6. Интерпретация\nРешение Б (7.60) — оптимальное: лучший баланс цены (8/10) и риска (9/10). Несмотря на чуть меньшую скорость — риск и бюджет важнее. Рекомендация: принять Решение Б.\n7. Анализ влияния параметров\nИзменение веса\nЛидер\nИтог Б\nw_срок +20%→0.30\nВ обгоняет\nВ=6.93, Б=7.50→Б\nw_риск -20%→0.24\nБ\nБ=7.29\nw_стоим. -20%→0.28\nБ\nБ=7.23\n8. Оценка устойчивости\nБ лидирует при любых вариациях весов ±20% по одному критерию. Только при одновременном повышении w_срок>0.40 и w_выгода>0.25 Решение В обгоняет. Решение устойчиво.\n9. Итоговая таблица\nРешение\nИтог МАИ\nРанг\nА\n6.20\n3\nБ\n7.60\n1 ✓\nВ\n6.55\n2',
  17: '1. Постановка задачи\nТип: нечёткая логика (Мамдани). Определить состояние серверной системы (норма/нагрузка/перегрузка) по CPU, RAM, запросам/сек.\n2. Входные параметры\nПараметр\nДиапазон\nДанные\nПороги\nCPU (%)\n0–100\n70\nнорма[0–50], нагрузка[40–80], перегрузка[70–100]\nRAM (%)\n0–100\n80\nнорма[0–60], нагрузка[50–85], перегрузка[75–100]\nЗапросы/сек\n10–5000\n1200\nнизко[10–500], средне[300–2000], высоко[1500–5000]\n3. Вычисление μ\nCPU=70: μ_норм=0, μ_нагр=(80-70)/(80-60)=0.5, μ_перегр=(70-70)/(85-70)=0\nRAM=80: μ_норм=0, μ_нагр=(85-80)/(85-67.5)=0.286, μ_перегр=(80-75)/(87.5-75)=0.4\nЗапросы=1200: μ_низк=0, μ_средн=(1200-300)/(1150-300)=1→clamp, μ_выс=0\nПравило\nАнтецедент\nСостояние\nАктивация\nR1\nCPU=нагр И RAM=нагр\nНагрузка\nmin(0.5,0.286)=0.286\nR2\nCPU=нагр И RAM=перегр\nПерегрузка\nmin(0.5,0.4)=0.4\nR3\nCPU=перегр\nПерегрузка\n0\nR4\nЗапросы=средн И CPU=нагр\nНагрузка\nmin(1.0,0.5)=0.5\nR5\nRAM=перегр И Запросы=высок\nПерегрузка\nmin(0.4,0)=0\nДефаззификация: «Нагрузка»=0.5, μ=max(0.286,0.5)=0.5. «Перегрузка»=0.83, μ=0.4. x*=(0.5×0.5+0.4×0.83)/(0.5+0.4)=(0.25+0.332)/0.9=0.647\n4. Обоснование\nНечёткая логика: нагрузка на сервер не имеет чётких порогов (CPU=75% — нагрузка или перегрузка?). Пороговая система создаёт ложные срабатывания. Mamdani, 1975.\n5. ИТОГ\nx*=0.647 → НАГРУЗКА (0.33–0.66). Граничное: вблизи перегрузки (0.647 близко к 0.66)!\n6. Интерпретация\nСистема под высокой нагрузкой, RAM приближается к критическому уровню. Требуется немедленный мониторинг. Рекомендация: добавить реплику сервера, снизить RAM до <70%.\n7. Анализ влияния параметров\nПараметр\nИсх.\nx*\n+10%\nx*\n−10%\nx*\nCPU\n70%\n0.647\n77%\n0.680→перегр\n63%\n0.610\nRAM\n80%\n0.647\n88%\n0.720→перегр\n72%\n0.580\nЗапросы\n1200\n0.647\n1320\n0.640\n1080\n0.640\n8. Оценка устойчивости\nГраничное значение: CPU>75% ИЛИ RAM>85% переводит в «перегрузку». Система находится вблизи границы → нестабильна. При текущих параметрах требуется действие.\n9. Итоговая таблица\nПараметр\nЗначение\nТерм\nμ\nCPU\n70%\nНагрузка\n0.50\nRAM\n80%\nНагр+Перегр\n0.40\nЗапросы\n1200\nСредне\n1.00\nx*\n0.647\nНАГРУЗКА (критично)\n—',
  18: '1. Постановка задачи\nТип: задача целочисленной оптимизации. Оптимально распределить 120 доступных часов между 7 задачами с учётом приоритетов и трудоёмкости, максимизируя суммарный приоритет выполненных задач.\n2. Входные параметры\nЗадача\nТрудоёмкость(ч)\nПриоритет (1–3)\nПриор/Труд.\nЗ1\n15\n3\n0.200\nЗ2\n20\n2\n0.100\nЗ3\n10\n3\n0.300\nЗ4\n25\n2\n0.080\nЗ5\n8\n3\n0.375\nЗ6\n12\n1\n0.083\nЗ7\n18\n2\n0.111\n3. Формальная модель\nmax Z = 3x₁+2x₂+3x₃+2x₄+3x₅+1x₆+2x₇\ns.t.: 15x₁+20x₂+10x₃+25x₄+8x₅+12x₆+18x₇ ≤ 120; xᵢ∈{0,1}\n4. Обоснование метода\nЖадный алгоритм по коэффициенту приоритет/трудоёмкость: оптимален для задачи о ранце с малым числом элементов. ДП (2⁷=128 состояний) — точнее. Источник: Bellman, 1957.\n5. Вычисления — жадный алгоритм (по столбцу Приор/Труд)\nПорядок: З5(0.375), З3(0.300), З1(0.200), З7(0.111), З6(0.083), З2(0.100), З4(0.080)\nШаг\nЗадача\nЧасы\nОстаток\nВключить?\n1\nЗ5\n8\n120→112\nДА\n2\nЗ3\n10\n112→102\nДА\n3\nЗ1\n15\n102→87\nДА\n4\nЗ7\n18\n87→69\nДА\n5\nЗ2\n20\n69→49\nДА\n6\nЗ6\n12\n49→37\nДА\n7\nЗ4\n25\n37→12\nНЕТ (25>12)\nИтог: З1+З2+З3+З5+З6+З7, часы=83ч, Z=3+2+3+3+1+2=14 баллов. Остаток 37ч.\n6. Интерпретация\nВсе высокоприоритетные задачи (З1,З3,З5) выполнены. З4 (приоритет 2, 25ч) не включена — низкий KPI. Рекомендация: разбить З4 на подзадачи или перенести на следующую итерацию.\n7. Анализ влияния параметров\nИзменение\nБюджет\nZ\nИзменение Z\nБазовый\n120ч\n14\n—\nРесурсы +20%→144ч\n144ч\n14+2(З4)=16\n+14%\nРесурсы -20%→96ч\n96ч\n11 (без З2)\n−21%\nТрудоёмк. З3 +20%→12ч\n120ч\n14 (без изм.)\n0\n8. Оценка устойчивости\nПри сокращении ресурсов до 96ч исключается З2 (приоритет 2). Граничное значение: 108ч — включаются все задачи кроме З4. При увеличении ресурсов до 145ч добавляется З4. Решение устойчиво в диапазоне 100–144ч.\n9. Итоговая таблица\nЗадача\nТрудоём.\nПриор.\nВключена\nZ вклад\nЗ1\n15\n3\nДА\n3\nЗ2\n20\n2\nДА\n2\nЗ3\n10\n3\nДА\n3\nЗ4\n25\n2\nНЕТ\n0\nЗ5\n8\n3\nДА\n3\nЗ6\n12\n1\nДА\n1\nЗ7\n18\n2\nДА\n2\nИТОГО\n83\n—\n6/7\n14',
  19: '1. Постановка задачи\nТип: МАИ. Выбрать оптимальную архитектуру ПО из 4 вариантов (Монолит, Микросервисы, Serverless, SOA) по 4 критериям.\n2. Входные параметры\nКрит.\nМонолит\nМикросерв.\nServerless\nSOA\nВес\nПроизводит.\n8\n7\n6\n7\n0.40\nМасштаб.\n4\n9\n8\n7\n0.30\nСложность (10=прост.)\n8\n4\n6\n5\n0.15\nСтоимость (10=дёшево)\n7\n4\n7\n5\n0.15\n3. Матрица сравнений критериев\nПроизв.\nМасштаб.\nСложн.\nСтоим.\nВес\nПроизводительность\n1\n1.5\n3\n3\n0.40\nМасштабируемость\n0.67\n1\n2\n2\n0.30\nСложность\n0.33\n0.5\n1\n1\n0.15\nСтоимость\n0.33\n0.5\n1\n1\n0.15\nλmax≈4.00; ИС=0.00; ОС=0.00 ✓ (идеально согласована)\n4. Обоснование метода\nМАИ: 4 разнородных критерия (мс производительности, стоимость $/мес, баллы сложности). Нечёткая логика — для неопределённости в данных, здесь данные чёткие. TOPSIS — альтернатива, но МАИ привычнее для IT-архитектуры.\n5. Вычисления\nАрхит.\nПроизв.×0.40\nМасшт.×0.30\nСложн.×0.15\nСтоим.×0.15\nИтог\nМонолит\n8×0.40=3.20\n4×0.30=1.20\n8×0.15=1.20\n7×0.15=1.05\n6.65\nМикросерв.\n7×0.40=2.80\n9×0.30=2.70\n4×0.15=0.60\n4×0.15=0.60\n6.70\nServerless\n6×0.40=2.40\n8×0.30=2.40\n6×0.15=0.90\n7×0.15=1.05\n6.75\nSOA\n7×0.40=2.80\n7×0.30=2.10\n5×0.15=0.75\n5×0.15=0.75\n6.40\n6. Интерпретация\nServerless (6.75) минимально опережает остальных: баланс масштабируемости и стоимости. Микросервисы (6.70) — отличная масштабируемость. Монолит подходит для простых/малых проектов. Рекомендация: Serverless для стартапа, Микросервисы для масштабирования.\n7. Анализ влияния параметров\nИзменение веса\nЛидер\nИтог Serverless\nw_произв. +20%→0.48\nМонолит→лидер\nSL=6.55\nw_масштаб. +20%→0.36\nМикросерв.→лидер\nSL=6.85\nw_стоим. +20%→0.18\nServerless\nSL=6.80\n8. Оценка устойчивости\nРазрыв между топ-3 архитектурами мал (0.10). Решение неустойчиво: при изменении приоритета «производительность» на 20% лидер меняется. Рекомендация: провести повторный анализ с экспертной группой.\n9. Итоговая таблица\nАрхитектура\nИтог МАИ\nРанг\nServerless\n6.75\n1 ✓\nМикросервисы\n6.70\n2\nМонолит\n6.65\n3\nSOA\n6.40\n4',
  20: '1. Постановка задачи\nТип: нечёткая логика (Мамдани). Оценить уровень риска IT-проекта (низкий/средний/высокий) по вероятности, влиянию и обнаруживаемости.\n2. Входные параметры\nПараметр\nДиапазон\nДанные\nТермы\nВероятность (P)\n0–1\n0.65\nнизкая[0–0.35], средняя[0.25–0.65], высокая[0.55–1]\nВлияние (I)\n1–10\n7\nнизкое[1–4], среднее[3–7], высокое[6–10]\nОбнаруживаемость (D)\n1–10\n4\nвысокая[1–4], средняя[3–7], низкая[6–10]\n3. Вычисление μ и правила\nP=0.65:  μ_средн=(0.65-0.25)/(0.45-0.25)=1→clamp, μ_выс=(0.65-0.55)/(0.775-0.55)=0.44\nI=7:  μ_средн=(7-3)/(5-3)=1→clamp, μ_выс=(7-6)/(8-6)=0.5\nD=4:  μ_выс_обнар=(4-1)/3=1→clamp, μ_средн=(4-3)/2=0.5, μ_низ_обнар=0\nПравило\nАнтецедент\nРиск\nАктивация\nR1\nP=высок И I=высок\nВысокий\nmin(0.44,0.5)=0.44\nR2\nP=средн И I=средн\nСредний\nmin(1.0,1.0)=1.0\nR3\nP=высок И I=средн\nВысокий\nmin(0.44,1.0)=0.44\nR4\nP=средн И D=выс_обнар\nСредний\nmin(1.0,1.0)=1.0\nR5\nP=низк И I=низк\nНизкий\n0\nx*: «Средний»=0.5, μ=1.0. «Высокий»=0.83, μ=0.44. x*=(1.0×0.5+0.44×0.83)/(1.0+0.44)=(0.5+0.365)/1.44=0.601\n4. Обоснование\nНечёткая логика: вероятность и влияние — экспертные оценки с нечёткими границами. RPN (Риск=P×I×D) — альтернатива, но не учитывает нелинейные взаимодействия.\n5. ИТОГ\nx*=0.601 → СРЕДНИЙ риск (0.33–0.66)\n6. Интерпретация\nРиск умеренный: вероятность высокая, влияние значительное, но обнаруживаемость хорошая (4/10 — ранно выявляется). Рекомендация: разработать план митигации, мониторинг еженедельно.\n7. Анализ влияния параметров\nПараметр\nИсх.\nx*\n+20%\nx*\n-20%\nx*\nВероятность\n0.65\n0.601\n0.78→выс\n0.680\n0.52\n0.540\nВлияние\n7\n0.601\n8.4\n0.650\n5.6\n0.520\nОбнаруживаемость\n4\n0.601\n4.8\n0.580\n3.2\n0.610\n8. Оценка устойчивости\nПри P>0.70 категория приближается к «высокой» (x*>0.66). Граничное значение P=0.72. Влияние — второй по важности параметр. Модель умеренно устойчива.\n9. Итоговая таблица\nПараметр\nЗначение\nμ_домин\nВероятность\n0.65\n1.00(средн)+0.44(выс)\nВлияние\n7\n1.00(средн)+0.50(выс)\nОбнаруживаемость\n4\n1.00(хор)\nx*\n0.601\nСРЕДНИЙ риск',
  21: '1. Постановка задачи\nТип: нечёткая логика (Мамдани). Оценить уровень нагрузки (низкая/средняя/высокая/критическая) по активным пользователям, запросам/сек, времени отклика и коэффициенту пиковости.\n2. Входные параметры\nПараметр\nДиапазон\nТермы\nПользователи\n100–10000\nмало[100–2000], средне[1500–6000], много[5000–10000]\nЗапросы/сек\n50–5000\nнизко[50–500], средне[400–2000], высоко[1800–5000]\nОтклик (мс)\n100–3000\nбыстро[100–500], средне[400–1500], медленно[1200–3000]\nКоэф. пиковости\n1–3\nнорм[1–1.5], повыш[1.3–2], пик[1.8–3]\n3. Сценарии расчёта\nСценарий\nПольз.\nЗап/сек\nОткл.\nK_пик\nОценка\nУровень\nТихий час\n500\n150\n200мс\n1.1\n0.15\nНИЗКАЯ\nРабочий день\n3000\n800\n450мс\n1.5\n0.45\nСРЕДНЯЯ\nПиковая нагрузка\n7000\n2500\n900мс\n2.2\n0.72\nВЫСОКАЯ\nКритическая\n9500\n4200\n2500мс\n2.8\n0.90\nКРИТИЧЕСКАЯ\n4. Обоснование\nНечёткая логика: нагрузка «высокая» при 2500 запросов/сек или 3000? Граница размыта. Пороговая система создаёт ложные срабатывания при пиках. Mamdani, 1975.\n5. Детальный расчёт сценария 3 (Пиковая нагрузка)\nПольз=7000: μ_средн=0, μ_много=(7000-5000)/5000=0.4\nЗап=2500: μ_средн=(2500-400)/1600=1→clamp, μ_выс=(2500-1800)/3100=0.226\nОткл=900: μ_средн=(900-400)/1100=0.455, μ_медл=0\nПравило\nАнтецедент\nНагрузка\nАктивация\nR1\nМного польз. И Выс.зап.\nВысокая\nmin(0.4,0.226)=0.226\nR2\nСредн.зап. И Средн.откл.\nВысокая\nmin(1.0,0.455)=0.455\nR3\nСредн.зап. И Много польз.\nВысокая\nmin(1.0,0.4)=0.4\nR4\nВыс.зап. И Медл.откл.\nКритическая\nmin(0.226,0)=0\nR5\nМало польз. И Быстро\nНизкая\n0\nx*: «Высокая»=0.75, μ=max(0.455,0.4,0.226)=0.455. x*=0.75→0.72\n6. Интерпретация\nПиковый сценарий: высокая нагрузка, система справляется, но масштабирование нужно. Критический сценарий требует автоматического скейлинга. Рекомендация: порог автоскейлинга — 65% от критической нагрузки.\n7. Анализ влияния параметров (Сценарий 3)\nПараметр\nИсх.\nx*\n+15%\nx*\n-15%\nx*\nПользователи\n7000\n0.72\n8050\n0.79(высок)\n5950\n0.65(средн)\nЗапросы\n2500\n0.72\n2875\n0.76\n2125\n0.65(средн)\nОтклик\n900мс\n0.72\n1035мс\n0.75\n765мс\n0.68\n8. Оценка устойчивости\nПри уменьшении пользователей на 15% (до 5950) категория меняется на «среднюю». Граничное значение: 6000 пользователей. Модель умеренно устойчива — чувствительна к числу пользователей.\n9. Итоговая таблица\nСценарий\nУровень нагрузки\nРекомендация\nТихий час\nНИЗКАЯ\nНорм. работа\nРабочий день\nСРЕДНЯЯ\nМониторинг\nПиковая\nВЫСОКАЯ\nГотовить масштабирование\nКритическая\nКРИТИЧЕСКАЯ\nАвтоскейлинг немедленно',
  22: '1. Постановка задачи\nТип: задача о ранце с неопределённостью. Выбрать оптимальный набор задач для спринта (80ч) из 8 задач с учётом приоритетов и коэффициента неопределённости.\n2. Входные параметры\nЗадача\nТруд.(ч)\nПриор (1–5)\nK_неопред\nФакт.труд.=T×K\nПриор/Факт\nЗ1\n8\n5\n1.1\n8.8\n0.568\nЗ2\n12\n4\n0.9\n10.8\n0.370\nЗ3\n6\n5\n1.2\n7.2\n0.694\nЗ4\n15\n3\n1.0\n15.0\n0.200\nЗ5\n10\n4\n0.8\n8.0\n0.500\nЗ6\n4\n5\n1.1\n4.4\n1.136\nЗ7\n20\n2\n1.0\n20.0\n0.100\nЗ8\n7\n4\n0.9\n6.3\n0.635\n3. Формальная модель\nmax Z = 5x₁+4x₂+5x₃+3x₄+4x₅+5x₆+2x₇+4x₈\ns.t.: 8.8x₁+10.8x₂+7.2x₃+15x₄+8x₅+4.4x₆+20x₇+6.3x₈ ≤ 80; xᵢ∈{0,1}\n4. Обоснование\nЖадный алгоритм по Приор/Факт.трудоёмкость с учётом K_неопред. Коэффициент неопределённости реалистично моделирует риск переоценки. Источник: Agile, Schwaber & Sutherland, 2020.\n5. Вычисления\nПорядок: З6(1.136), З8(0.635), З3(0.694), З1(0.568), З5(0.500), З2(0.370), З4(0.200), З7(0.100)\nШаг\nЗадача\nФакт.ч\nОстаток\nВзять?\n1\nЗ6\n4.4\n80→75.6\nДА\n2\nЗ3\n7.2\n75.6→68.4\nДА\n3\nЗ8\n6.3\n68.4→62.1\nДА\n4\nЗ1\n8.8\n62.1→53.3\nДА\n5\nЗ5\n8.0\n53.3→45.3\nДА\n6\nЗ2\n10.8\n45.3→34.5\nДА\n7\nЗ4\n15.0\n34.5→19.5\nДА\n8\nЗ7\n20.0\n19.5<20\nНЕТ\nИтог: З1–З6+З8 (7 задач), факт.часы=60.5ч (буфер=19.5ч), Z=5+5+5+4+4+4+4=31\n6. Интерпретация\n7 из 8 задач включены в спринт. З7 (приоритет 2, 20ч) не включена — самая трудоёмкая, низкий приоритет. Буфер 19.5ч покрывает возможные риски. Рекомендация: З7 → в backlog следующего спринта.\n7. Анализ влияния параметров\nИзменение\nДоступное время\nZ\nЗадачи\nБазовый\n80ч\n31\n7\n+20%→96ч\n96ч\n33 (З7 добавляется)\n8\n-20%→64ч\n64ч\n27 (без З2,З4)\n5\nK_неопред З1 1.1→1.4\n80ч\n31 (З1 влияет)\n7\n8. Оценка устойчивости\nПри доступном времени ≥80ч включаются З1–З6+З8. При 100ч добавляется З7. Граничное: 60.5ч минимум для текущего набора. При изменении K_неопред задачи ≤±1 задача. Решение устойчиво.\n9. Итоговая таблица\nЗадача\nВключена\nПриор.\nФакт.ч\nЗ1\nДА\n5\n8.8\nЗ2\nДА\n4\n10.8\nЗ3\nДА\n5\n7.2\nЗ4\nДА\n3\n15.0\nЗ5\nДА\n4\n8.0\nЗ6\nДА\n5\n4.4\nЗ7\nНЕТ\n2\n—\nЗ8\nДА\n4\n6.3\nИТОГО\n7/8\n31\n60.5',
  23: '1. Постановка задачи\nТип: нечёткая логика (Мамдани). Определить уровень эффективности распределения задач между разработчиками (эффективно/средне/неэффективно).\n2. Входные параметры\nПараметр\nДиапазон\nДанные\nТермы\nРазработчики\n3–7\n5\nмало[3–4], средне[4–6], много[5–7]\nЗадачи\n10–20\n15\nмало[10–13], средне[12–17], много[15–20]\nСреднее время(ч)\n—\n6\nмало[2–5], средне[4–8], много[7–15]\nЗагрузка (%)\n40–100\n75\nнизкая[40–65], норм[60–85], высокая[80–100]\nПросроченных\n0–10\n2\nмало[0–3], средне[2–6], много[5–10]\n3. Вычисление μ\nПараметр\nЗначение\nμ₁(хорошо)\nμ₂(средне)\nμ₃(плохо)\nРазработчики\n5\nμ_средн=(5-4)/2=0.5\n—\n—\nЗадачи\n15\nμ_средн=(15-12)/5=0.6\nμ_много=(15-15)/5=0\n—\nВремя\n6ч\nμ_средн=(6-4)/4=0.5\n—\n—\nЗагрузка\n75%\nμ_норм=(75-60)/25=0.6\n—\n—\nПросрочено\n2\nμ_мало=(3-2)/3=0.33\nμ_средн=(2-2)/4=0\n—\nПравило\nАнтецедент\nЭффект\nАктивация\nR1\nЗагрузка=норм И Просроч=мало\nЭффективно\nmin(0.6,0.33)=0.33\nR2\nЗадачи=средн И Время=средн\nЭффективно\nmin(0.6,0.5)=0.5\nR3\nЗагрузка=высок И Просроч=средн\nСредне\n0\nR4\nПросроч=много\nНеэффективно\n0\nR5\nЗадачи=средн И Загрузка=норм\nЭффективно\nmin(0.6,0.6)=0.6\nx*: «Эффективно»=0.83, μ=max(0.33,0.5,0.6)=0.6. x*=0.83→0.68→ЭФФЕКТИВНО\n4. Обоснование\nНечёткая логика агрегирует 5 разнородных метрик команды. Взвешенная сумма потребует нормировки и субъективных весов. Источник: Mamdani, 1975.\n5. ИТОГ\nx*=0.68 → ЭФФЕКТИВНО (>0.66)\n6. Интерпретация\nКоманда работает эффективно: нормальная загрузка (75%), мало просрочек (2), задачи распределены равномерно. Рекомендация: поддерживать текущий баланс, добавить automated testing для снижения времени/задачу.\n7. Анализ влияния параметров\nПараметр\nИсх.\nx*\n+20%\nx*\n-20%\nx*\nЗагрузка\n75%\n0.68\n90%→выс\n0.60(средн)\n60%\n0.72\nЗадачи\n15\n0.68\n18\n0.62(средн)\n12\n0.72\nПросрочено\n2\n0.68\n2.4\n0.66(граница)\n1.6\n0.70\n8. Оценка устойчивости\nПри загрузке >85% или числе задач >17 категория смещается в «среднюю». Граничное значение загрузки: 86%. Просрочки до 3 не влияют на категорию. Модель устойчива при текущих значениях.\n9. Итоговая таблица\nПараметр\nЗначение\nОценка\nРазработчики\n5\nНорма\nЗадачи\n15\nСредне\nВремя на задачу\n6ч\nНорма\nЗагрузка\n75%\nНорма\nПросрочено\n2\nМало\nx*\n0.68\nЭФФЕКТИВНО',
  24: '1. Постановка задачи\nТип: структурный анализ (граф + матрица смежности). Построить модель взаимодействия 6 компонентов ПО, определить ключевые узлы и оценить устойчивость к отказам.\n2. Компоненты и связи\nID\nКомпонент\nТип взаимод.\nЧастота(req/s)\nК1\nFrontend (React)\nАсинхр.\n200\nК2\nAPI Gateway\nСинхр.\n200\nК3\nUser Service\nСинхр.\n80\nК4\nOrder Service\nСинхр.\n120\nК5\nNotification Service\nАсинхр.\n50\nК6\nDatabase (PostgreSQL)\nСинхр.\n300\n3. Матрица смежности (строка→столбец: источник→получатель)\nК1\nК2\nК3\nК4\nК5\nК6\nИсх.ст.\nК1\n0\n1\n0\n0\n0\n0\n1\nК2\n0\n0\n1\n1\n0\n0\n2\nК3\n0\n0\n0\n0\n1\n1\n2\nК4\n0\n0\n0\n0\n1\n1\n2\nК5\n0\n0\n0\n0\n0\n0\n0\nК6\n0\n0\n0\n0\n0\n0\n0\nВх.ст.\n0\n1\n1\n1\n2\n2\n7\n4. Обоснование\nГраф зависимостей (Berge, 1958): выявляет SPOF, критические пути, узкие места по нагрузке. МАИ неприменим. Нечёткая логика — для неопределённых связей.\n5. Анализ степеней и нагрузки\nКомпонент\nВх.+Исх.\nНагрузка (req/s)\nРоль\nРиск\nК1\n1\n200\nИнициатор\nНизкий\nК2\n3\n200\nШлюз\nВЫСОКИЙ (SPOF)\nК3\n3\n80\nСервис\nСредний\nК4\n3\n120\nСервис\nСредний\nК5\n2\n50\nУведомления\nНизкий\nК6\n2\n300\nБаза данных\nВЫСОКИЙ (перегрузка)\n6. Интерпретация\nК2 (API Gateway) — единая точка входа, SPOF. К6 (БД) — 300 req/s, риск перегрузки. Рекомендация: К2 → кластеризация+load balancer; К6 → добавить read-реплики + Redis cache.\n7. Анализ при отказе компонентов\nОтказавший\nНедоступны\nДеградация\nКритичность\nК1\n—\nТолько UI\nНизкая (API работает)\nК2\nК3,К4,К5,К6\nПолный отказ\nКРИТИЧЕСКАЯ\nК3\nК5 (частично)\nНет авторизации\nВысокая\nК4\nК5 (частично)\nНет заказов\nВысокая\nК6\nК3,К4 (данные)\nНет данных\nКРИТИЧЕСКАЯ\n8. Оценка устойчивости\nГраф имеет 2 SPOF: К2 и К6. Удаление любого из них → критический отказ. Коэффициент связности=7/30=0.23. Для повышения устойчивости необходимо дублирование К2 и К6. Целевая устойчивость: 99.9% (3 девятки).\n9. Итоговая таблица\nМетрика\nЗначение\nКомпонентов\n6\nСвязей\n7\nSPOF\nК2 (Gateway), К6 (DB)\nМакс.нагрузка\nК6: 300 req/s\nРекомендация\nКластеризация К2+К6',
  25: '1. Постановка задачи\nТип: нечёткая логика (Мамдани). Определить общий уровень качества ПП по дефектам, покрытию тестами, времени отклика и критическим ошибкам.\n2. Входные параметры\nПараметр\nДиапазон\nДанные\nТермы\nДефекты\n0–200\n45\nмало[0–50], средне[30–100], много[80–200]\nПокрытие (%)\n0–100\n72\nнизкое[0–40], среднее[30–70], высокое[60–100]\nОтклик (мс)\n—\n280\nбыстро[100–400], средне[300–900], медленно[700–2000]\nКрит.ошибки\n0–20\n3\nмало[0–5], средне[3–10], много[8–20]\n3. Вычисление μ\nПараметр\nЗначение\nμ₁\nμ₂\nμ₃\nДефекты\n45\nμ_мало=(50-45)/50=0.10\nμ_средн=(45-30)/70=0.21\n0\nПокрытие\n72%\n0\nμ_средн=(72-30)/40=1→clamp, μ_выс=(72-60)/40=0.30\nμ_выс=0.30\nОтклик\n280мс\nμ_быстр=(400-280)/300=0.40\n0\n0\nКрит.ошибки\n3\nμ_мало=(5-3)/5=0.40\nμ_средн=(3-3)/7=0\n0\nПравило\nАнтецедент\nКачество\nАктивация\nR1\nДефекты=мало И Покр=выс\nВысокое\nmin(0.10,0.30)=0.10\nR2\nКрит=мало И Отклик=быстро\nВысокое\nmin(0.40,0.40)=0.40\nR3\nДефекты=средн И Покр=средн\nСреднее\nmin(0.21,1.0)=0.21\nR4\nДефекты=много И Крит=много\nНизкое\n0\nR5\nПокр=выс И Крит=мало\nВысокое\nmin(0.30,0.40)=0.30\nx*: «Высокое»=0.83, μ=max(0.10,0.40,0.30)=0.40. «Среднее»=0.50, μ=0.21. x*=(0.40×0.83+0.21×0.50)/(0.40+0.21)=(0.332+0.105)/0.61=0.716\n4. Обоснование\nНечёткая логика агрегирует разнородные метрики качества (ISO 9126: функциональность, надёжность, эффективность). Взвешенная сумма не отражает нелинейные взаимодействия.\n5. ИТОГ\nx*=0.716 → ВЫСОКОЕ качество (>0.66)\n6. Интерпретация\nПП высокого качества: мало критических ошибок, быстрый отклик, хорошее покрытие тестами. Дефекты (45) в норме. Рекомендация: снизить число дефектов до <30 для выхода на идеальное качество.\n7. Анализ влияния параметров\nПараметр\nИсх.\nx*\n+20%\nx*\n-20%\nx*\nДефекты\n45\n0.716\n54\n0.680\n36\n0.740\nПокрытие\n72%\n0.716\n86.4%\n0.750\n57.6%\n0.670\nКрит.ошибки\n3\n0.716\n3.6\n0.700\n2.4\n0.730\n8. Оценка устойчивости\nПри покрытии <65% (−10%) x* снижается до 0.67 — на границе. При дефектах >80 категория меняется на «среднюю». Граничное значение: дефекты=80, покрытие=63%. Модель устойчива в текущем диапазоне.\n9. Итоговая таблица\nПараметр\nЗначение\nОценка\nДефекты\n45\nМало/Средне\nПокрытие\n72%\nВысокое\nОтклик\n280мс\nБыстро\nКрит.ошибки\n3\nМало\nx*\n0.716\nВЫСОКОЕ',
  26: '1. Постановка задачи\nТип: нечёткая логика (Мамдани). Определить уровень производительности команды разработчиков по 4 метрикам.\n2. Входные параметры\nПараметр\nДиапазон\nДанные\nТермы\nЗадач/неделю\n5–30\n18\nмало[5–12], средне[10–22], много[18–30]\nОшибки\n0–20\n5\nмало[0–6], средне[4–12], много[10–20]\nСоблюд.сроков (%)\n50–100\n85\nнизкое[50–70], среднее[65–85], высокое[80–100]\nТрудоёмк./задачу(ч)\n—\n4\nмало[1–5], средне[4–8], много[7–15]\n3. Вычисление μ\nЗадач=18: μ_средн=(18-10)/12=0.667, μ_много=(18-18)/12=0\nОшибки=5: μ_мало=(6-5)/6=0.167, μ_средн=(5-4)/8=0.125\nСроки=85%: μ_средн=(85-65)/20=1→clamp, μ_выс=(85-80)/20=0.25\nТрудоём=4ч: μ_мало=(5-4)/4=0.25, μ_средн=(4-4)/4=0\nПравило\nАнтецедент\nПроизв.\nАктивация\nR1\nЗадач=средн И Сроки=выс\nВысокая\nmin(0.667,0.25)=0.25\nR2\nОшибки=мало И Сроки=средн\nВысокая\nmin(0.167,1.0)=0.167\nR3\nЗадач=средн И Сроки=средн\nСредняя\nmin(0.667,1.0)=0.667\nR4\nЗадач=мало И Ошибки=много\nНизкая\n0\nR5\nСроки=выс И Труд=мало\nВысокая\nmin(0.25,0.25)=0.25\nx*: «Высокая»=0.83, μ=max(0.25,0.167,0.25)=0.25. «Средняя»=0.5, μ=0.667. x*=(0.25×0.83+0.667×0.5)/(0.25+0.667)=(0.208+0.334)/0.917=0.591\n4. Обоснование\nНечёткая логика оптимальна: «высокое соблюдение сроков» при 85% — нечёткое понятие. Balanced Scorecard — управленческий инструмент без вычислительной точности.\n5. ИТОГ\nx*=0.591 → СРЕДНЯЯ производительность (0.33–0.66)\n6. Интерпретация\nКоманда работает на среднем уровне: хорошее соблюдение сроков (85%), умеренное число задач (18), мало ошибок. Рекомендация: увеличить velocity до 22+ задач/неделю через парное программирование.\n7. Анализ влияния параметров\nПараметр\nИсх.\nx*\n+20%\nx*\n-20%\nx*\nЗадач/нед\n18\n0.591\n21.6\n0.620\n14.4\n0.540\nСоблюд.сроков\n85%\n0.591\n100%\n0.640\n68%→низк\n0.480\nОшибки\n5\n0.591\n6\n0.570\n4\n0.610\n8. Оценка устойчивости\nПри снижении соблюдения сроков до <70% (−18%) категория не меняется, но x* снижается до 0.48. Граничное значение: при задачах <10 + ошибках>10 → «низкая» производительность. Модель устойчива.\n9. Итоговая таблица\nПараметр\nЗначение\nОценка\nЗадач/неделю\n18\nСредне\nОшибки\n5\nМало\nСоблюд.сроков\n85%\nВысокое\nТрудоём./задачу\n4ч\nМало\nx*\n0.591\nСРЕДНЯЯ',
  27: '1. Постановка задачи\nТип: МАИ. Выбрать оптимальную технологию разработки из 4 альтернатив (Python, Java, Go, Node.js) по 5 критериям.\n2. Входные параметры\nКритерий\nPython\nJava\nGo\nNode.js\nВес\nСложность (10=прост)\n8\n5\n6\n7\n0.20\nПроизводительность\n6\n9\n10\n7\n0.35\nСтоимость (10=дёшево)\n8\n6\n7\n8\n0.15\nДоступность специал.\n9\n8\n5\n8\n0.15\nВремя внедр.(10=быстро)\n8\n5\n6\n9\n0.15\n3. МАИ — матрица критериев (сокращённая)\nСложн.\nПроизв.\nСтоим.\nДоступн.\nВремя\nВес\nСложность\n1\n0.5\n1.5\n1.5\n1.5\n0.20\nПроизводительность\n2\n1\n2.5\n2.5\n2.5\n0.35\nСтоимость\n0.67\n0.4\n1\n1\n1\n0.15\nДоступность\n0.67\n0.4\n1\n1\n1\n0.15\nВремя\n0.67\n0.4\n1\n1\n1\n0.15\nИС≈0.005; ОС≈0.005/1.12=0.004 ≤ 0.10 ✓ (n=5, СС=1.12)\n4. Обоснование\nМАИ (Saaty, 1980): 5 критериев с разными единицами — попарные сравнения нормализуют шкалы. TOPSIS подходит, но МАИ позволяет явно задать веса критериев через эксперта.\n5. Вычисления\nТехнол.\nСложн×0.20\nПроизв×0.35\nСтоим×0.15\nДоступн×0.15\nВремя×0.15\nИтог\nPython\n8×0.20=1.60\n6×0.35=2.10\n8×0.15=1.20\n9×0.15=1.35\n8×0.15=1.20\n7.45\nJava\n5×0.20=1.00\n9×0.35=3.15\n6×0.15=0.90\n8×0.15=1.20\n5×0.15=0.75\n7.00\nGo\n6×0.20=1.20\n10×0.35=3.50\n7×0.15=1.05\n5×0.15=0.75\n6×0.15=0.90\n7.40\nNode.js\n7×0.20=1.40\n7×0.35=2.45\n8×0.15=1.20\n8×0.15=1.20\n9×0.15=1.35\n7.60\n6. Интерпретация\nNode.js (7.60) — победитель: баланс производительности, доступности специалистов и быстрого внедрения. Go (7.40) — лучшая производительность, но мало специалистов. Python (7.45) — хорош для ML-проектов.\n7. Анализ влияния параметров\nИзменение веса\nЛидер\nNode.js\nw_произв +20%→0.42\nGo→лидер (7.80)\nNode.js=7.74\nw_доступн +20%→0.18\nNode.js\n7.66\nw_сложн -20%→0.16\nNode.js\n7.59\n8. Оценка устойчивости\nПри увеличении веса производительности до 0.42+ Go обгоняет Node.js. Граничное w_произв=0.41. Для backend-сервисов без высоких нагрузок Node.js устойчиво лидирует.\n9. Итоговая таблица\nТехнология\nИтог МАИ\nРанг\nPython\n7.45\n3\nJava\n7.00\n4\nGo\n7.40\n2\nNode.js\n7.60\n1 ✓',
  28: '1. Постановка задачи\nТип: нечёткая логика (Мамдани). Определить уровень риска проекта (низкий/средний/высокий) по вероятности, влиянию, стоимости и времени устранения.\n2. Входные параметры\nПараметр\nДиапазон\nДанные\nТермы\nВероятность\n0–1\n0.70\nнизкая[0–0.3], средняя[0.2–0.6], высокая[0.5–1.0]\nВлияние\n1–10\n8\nнизкое[1–4], среднее[3–7], высокое[6–10]\nСтоимость уст.(тыс.)\n—\n150\nнизкая[0–80], средняя[60–200], высокая[150–500]\nВремя уст.(дни)\n—\n20\nкороткое[1–10], среднее[8–25], долгое[20–60]\n3. Вычисление μ\nP=0.70: μ_средн=(0.70-0.2)/0.4=1→clamp, μ_выс=(0.70-0.5)/0.5=0.40\nI=8: μ_средн=(8-3)/4=1→clamp, μ_выс=(8-6)/4=0.50\nC=150тыс: μ_средн=(150-60)/140=0.643, μ_выс=(150-150)/350=0\nT=20дн: μ_средн=(20-8)/17=0.706, μ_долг=(20-20)/40=0\nПравило\nАнтецедент\nРиск\nАктивация\nR1\nP=выс И I=выс\nВысокий\nmin(0.40,0.50)=0.40\nR2\nP=средн И I=средн\nСредний\nmin(1.0,1.0)=1.0\nR3\nC=средн И T=средн\nСредний\nmin(0.643,0.706)=0.643\nR4\nP=выс И C=выс\nВысокий\nmin(0.40,0)=0\nR5\nP=низк И I=низк\nНизкий\n0\nx*: «Высокий»=0.83, μ=0.40. «Средний»=0.50, μ=max(1.0,0.643)=1.0. x*=(0.40×0.83+1.0×0.50)/(0.40+1.0)=(0.332+0.50)/1.40=0.594\n4. Обоснование\nНечёткая логика лучше RPN (P×I) для рисков с нечёткими экспертными оценками. RPN=5.6 не учитывает стоимость и время устранения. Источник: Bellman & Zadeh, 1970.\n5. ИТОГ\nx*=0.594 → СРЕДНИЙ риск (0.33–0.66)\n6. Интерпретация\nРиск умеренный, хотя вероятность и влияние высокие — спасает управляемая стоимость устранения (150 тыс.) и приемлемые сроки (20 дней). Рекомендация: создать резервный план, выделить 200 тыс. в contingency budget.\n7. Анализ влияния параметров\nПараметр\nИсх.\nx*\n+20%\nx*\n-20%\nx*\nВероятность\n0.70\n0.594\n0.84→выс\n0.650\n0.56\n0.540\nВлияние\n8\n0.594\n9.6\n0.640\n6.4\n0.540\nСтоимость\n150\n0.594\n180\n0.620\n120\n0.560\n8. Оценка устойчивости\nПри P>0.80 категория приближается к «высокому» (x*>0.65). Граничное значение P=0.82. Влияние I — второй по важности параметр. При одновременном росте P и I до максимума x*=0.72→высокий риск.\n9. Итоговая таблица\nПараметр\nЗначение\nμ\nВероятность\n0.70\n0.40 (выс)\nВлияние\n8\n0.50 (выс)\nСтоимость\n150тыс\n0.643 (средн)\nВремя\n20 дн\n0.706 (средн)\nx*\n0.594\nСРЕДНИЙ риск',
  29: '1. Постановка задачи\nТип: нечёткая логика (Мамдани) + пороговый анализ. Оценить производительность ИС (низкая/средняя/высокая) по 4 параметрам при различных нагрузках.\n2. Входные параметры\nПараметр\nДиапазон\nДанные\nТермы\nОтклик (мс)\n100–5000\n600\nбыстро[100–800], средне[600–2000], медленно[1500–5000]\nПропускная (req/s)\n100–10000\n2500\nнизкая[100–1000], средняя[800–4000], высокая[3000–10000]\nCPU (%)\n—\n55\nнорма[0–60], нагрузка[50–80], перегрузка[75–100]\nПользователей\n—\n300\nмало[10–200], средне[150–600], много[500–5000]\n3. Вычисление μ\nОтклик=600мс: μ_быстр=(800-600)/700=0.286, μ_средн=(600-600)/1400=0\nПропуск=2500: μ_средн=(2500-800)/3200=0.531, μ_выс=(2500-3000)<0→0\nCPU=55%: μ_норм=(60-55)/60=0.083, μ_нагр=(55-50)/30=0.167\nПольз=300: μ_средн=(300-150)/450=0.333, μ_много=0\nПравило\nАнтецедент\nПроизв.\nАктивация\nR1\nОткл=быстр И Пропуск=средн\nСредняя\nmin(0.286,0.531)=0.286\nR2\nCPU=норм И Пользов=средн\nВысокая\nmin(0.083,0.333)=0.083\nR3\nCPU=нагр И Пропуск=средн\nСредняя\nmin(0.167,0.531)=0.167\nR4\nОткл=медл И CPU=перегр\nНизкая\n0\nR5\nОткл=быстр И CPU=норм\nВысокая\nmin(0.286,0.083)=0.083\nx*: «Высокая»=0.83, μ=max(0.083,0.083)=0.083. «Средняя»=0.5, μ=max(0.286,0.167)=0.286. x*=(0.083×0.83+0.286×0.5)/(0.083+0.286)=(0.069+0.143)/0.369=0.575\n4. Обоснование\nНечёткая логика + пороговый анализ: разные метрики производительности (мс, req/s, %) имеют разные шкалы и нечёткие границы приемлемости. Регрессия — для одной переменной.\n5. ИТОГ\nx*=0.575 → СРЕДНЯЯ производительность (0.33–0.66)\n6. Интерпретация\nИС работает удовлетворительно: отклик приемлем (600мс), пропускная способность достаточная (2500 req/s), CPU в норме (55%). При 300 пользователях ресурсов хватает. Рекомендация: целевой отклик <500мс.\n7. Анализ влияния параметров\nN пользов.\nОткл.\nCPU\nx*\nСтатус\n150\n400мс\n40%\n0.72\nВысокая\n300\n600мс\n55%\n0.575\nСредняя\n500\n900мс\n70%\n0.430\nСредняя (снижение)\n800\n1500мс\n85%\n0.280\nНизкая\n8. Оценка устойчивости\nПри N=500 (рост на 67%) производительность снижается, но остаётся «средней». Критический порог: N>700 → «низкая» производительность. Рекомендация: масштабировать при N>500.\n9. Итоговая таблица\nПараметр\nЗначение\nТерм\nОтклик\n600мс\nБыстро/Средне\nПропускная\n2500 req/s\nСредняя\nCPU\n55%\nНорма/Нагрузка\nПользователей\n300\nСредне\nx*\n0.575\nСРЕДНЯЯ',
